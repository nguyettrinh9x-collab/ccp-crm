<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCP CRM — Demo</title>
<style>
  :root{
    --teal:#3f7d72; --teal-dark:#2f5d55; --sage:#8fb3a6; --cream:#f6f2e9;
    --bg:#f3f5f4; --card:#ffffff; --line:#e3e8e6; --text:#22302c; --muted:#6b7c76;
    --hot:#e8553a; --warn:#f4b740; --over:#e23d3d; --won:#2f9e6e;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,Arial,sans-serif}
  body{background:var(--bg);color:var(--text);font-size:14px}
  /* ---------- LOGIN ---------- */
  #login{position:fixed;inset:0;background:linear-gradient(135deg,var(--teal),var(--teal-dark));
    display:flex;align-items:center;justify-content:center}
  .login-card{background:#fff;border-radius:18px;padding:40px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.25);text-align:center}
  .logo{font-size:26px;font-weight:800;color:var(--teal);letter-spacing:1px}
  .logo small{display:block;font-size:12px;color:var(--muted);font-weight:500;margin-top:4px}
  .login-card input{width:100%;padding:11px 13px;margin-top:12px;border:1px solid var(--line);border-radius:10px;font-size:14px}
  .login-card button{width:100%;margin-top:16px;padding:12px;border:0;border-radius:10px;background:var(--teal);color:#fff;font-weight:600;cursor:pointer}
  .hint{margin-top:18px;font-size:12px;color:var(--muted);text-align:left;background:var(--cream);padding:10px 12px;border-radius:10px;line-height:1.6}
  /* ---------- APP LAYOUT ---------- */
  #app{display:none;min-height:100vh}
  .sidebar{position:fixed;left:0;top:0;bottom:0;width:230px;background:var(--teal-dark);color:#dce9e5;padding:20px 0;display:flex;flex-direction:column}
  .sidebar .logo{color:#fff;padding:0 22px 16px;text-align:left}
  .nav a{display:flex;align-items:center;gap:11px;padding:12px 22px;color:#cfe0db;text-decoration:none;font-weight:500;cursor:pointer;border-left:3px solid transparent}
  .nav a:hover{background:rgba(255,255,255,.06)}
  .nav a.active{background:rgba(255,255,255,.12);border-left-color:var(--sage);color:#fff}
  .nav .ic{width:18px;text-align:center}
  .sidebar .foot{margin-top:auto;padding:14px 22px;border-top:1px solid rgba(255,255,255,.12);font-size:12px}
  .sidebar .foot b{color:#fff}
  .logout{margin-top:8px;color:#ffd9d0;cursor:pointer;font-size:12px}
  .main{margin-left:230px;padding:26px 30px}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
  .topbar h1{font-size:21px}
  .badge{background:var(--cream);color:var(--teal-dark);padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600}
  /* alert banner */
  #alertbar{background:#fff4e0;border:1px solid var(--warn);color:#8a6400;padding:11px 16px;border-radius:10px;margin-bottom:18px;font-size:13px;display:none}
  /* ---------- CARDS / KPI ---------- */
  .grid{display:grid;gap:16px}
  .kpi-grid{grid-template-columns:repeat(4,1fr)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px}
  .kpi .lbl{font-size:12px;color:var(--muted);margin-bottom:6px}
  .kpi .val{font-size:26px;font-weight:800;color:var(--teal-dark)}
  .kpi .val.red{color:var(--over)} .kpi .val.green{color:var(--won)} .kpi .val.amber{color:#cf9300}
  h2.sec{font-size:15px;margin:24px 0 12px}
  /* ---------- TABLE ---------- */
  table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden}
  th,td{padding:10px 12px;text-align:left;font-size:13px;border-bottom:1px solid var(--line)}
  th{background:var(--cream);color:var(--teal-dark);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.4px}
  tr:last-child td{border-bottom:0}
  .mkt-tbl td,.mkt-tbl th{border-right:1px solid #eaeee9}
  .mkt-tbl td:last-child,.mkt-tbl th:last-child{border-right:0}
  .mkt-tbl th{background:#eb9a3c;color:#1c1c1c;font-weight:800}
  .mkt-tbl .mkt-tong td{background:#5fdd5f;color:#10210f;font-weight:800;font-size:14px}
  .mkt-tbl input{border:1px solid #d6ded8;border-radius:8px;padding:6px 8px;font-size:13px;color:#1e2b24;background:#fff}
  .mkt-tbl input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 2px rgba(58,124,106,.15)}
  .mkt-tbl input[type=number]{text-align:center;font-weight:600}
  .pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
  .row-hot{box-shadow:inset 4px 0 0 var(--hot)}
  .row-warn{background:#fffbf0} .row-over{background:#fdeeee} .row-won{background:#eefaf3}
  .tag-nong{background:#fde3dd;color:var(--hot)} .tag-am{background:#fdf0d8;color:#b07d00} .tag-lanh{background:#e4eef5;color:#3b6e92}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
  /* ---------- FILTERS / FORM ---------- */
  .filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;align-items:center}
  .filters select,.filters input{padding:8px 10px;border:1px solid var(--line);border-radius:9px;font-size:13px;background:#fff;width:auto;max-width:190px}
  .filters input.search{flex:1 1 240px;min-width:200px;max-width:none}
  .colbar{display:flex;flex-wrap:wrap;gap:6px 14px;align-items:center;margin-bottom:10px;font-size:12.5px}
  .colbar label{display:inline-flex;align-items:center;gap:5px;font-weight:500;color:var(--text);margin:0;cursor:pointer}
  .colbar input{width:auto;margin:0}
  .rev-grid{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px}
  .rev-card{flex:1 1 130px;min-width:120px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 14px}
  .rev-card .rl{font-size:12px;color:var(--muted)} .rev-card .rv{font-size:18px;font-weight:800;color:var(--teal-dark)} .rev-card .rn{font-size:11px;color:var(--muted)}
  form .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px}
  input,select,textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-size:13px;font-family:inherit}
  .full{grid-column:1/3}
  .btn{padding:12px 26px;border:0;border-radius:10px;background:var(--teal);color:#fff;font-weight:700;cursor:pointer;font-size:15px}
  .btn.ghost{background:#fff;border:1px solid var(--line);color:var(--text)}
  .view{display:none} .view.active{display:block}
  .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-bottom:12px}
  .legend span{display:flex;align-items:center;gap:6px}
  .sw{width:14px;height:14px;border-radius:4px;display:inline-block}
  .bar{height:9px;background:var(--cream);border-radius:6px;overflow:hidden}
  .bar>div{height:100%;background:var(--teal)}
  .empty{color:var(--muted);text-align:center;padding:24px}
  /* ---------- MOBILE / RESPONSIVE ---------- */
  #navtoggle{display:none;position:fixed;top:10px;left:10px;z-index:210;background:var(--teal-dark);color:#fff;border:0;border-radius:10px;width:44px;height:44px;font-size:20px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.25)}
  #navmask{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:190}
  @media (max-width:820px){
    #navtoggle{display:flex;align-items:center;justify-content:center}
    .sidebar{transform:translateX(-100%);transition:transform .25s ease;z-index:200;width:250px;box-shadow:4px 0 24px rgba(0,0,0,.25)}
    #app.navopen .sidebar{transform:translateX(0)}
    #app.navopen #navmask{display:block}
    .main{margin-left:0;padding:64px 14px 24px}
    .topbar{flex-wrap:wrap;gap:8px}
    .topbar h1{font-size:19px}
    .kpi-grid{grid-template-columns:repeat(2,1fr)}
    form .form-grid{grid-template-columns:1fr}
    .full{grid-column:1/2}
    th,td{padding:8px 9px;font-size:12.5px}
    .btn{padding:10px 18px;font-size:14px}
    .filters select,.filters input{max-width:none;flex:1 1 140px}
    .login-card{width:90vw;max-width:360px;padding:28px 22px}
  }
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login">
  <div class="login-card">
    <div class="logo">CCP CRM<small>Hệ thống chăm sóc khách hàng chủ động</small></div>
    <input id="u" placeholder="Tài khoản" autocomplete="off">
    <input id="p" type="password" placeholder="Mật khẩu">
    <button onclick="login()">Đăng nhập</button>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app">
  <button id="navtoggle" onclick="toggleSidebar()" aria-label="Menu">☰</button>
  <div id="navmask" onclick="toggleSidebar()"></div>
  <div class="sidebar">
    <div class="logo">CCP CRM</div>
    <nav class="nav" id="nav">
      <a data-v="today" class="active">Việc cần làm</a>
      <a data-v="care">Chăm sóc khách</a>
      <a data-v="list_all">Tất cả khách</a>
      <a data-v="list_chot">Khách đã chốt</a>
      <a data-v="list_chua">Khách chưa chốt</a>
      <a data-v="add">Thêm khách</a>
      <a data-v="dashboard">Tổng quan</a>
      <a data-v="report">Báo cáo</a>
      <a data-v="marketing">Marketing</a>
      <a data-v="team">Sale team</a>
      <a data-v="lichlam">Đăng ký lịch làm</a>
      <a data-v="perms">Tài khoản</a>
      <a data-v="settings">Cài đặt</a>
      <a data-v="trash">Thùng rác</a>
    </nav>
    <div class="foot">
      Đăng nhập: <b id="who"></b><br><span id="role"></span>
      <div class="logout" onclick="logout()">↩ Đăng xuất</div>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <h1 id="title">Dashboard</h1>
      <span class="badge" id="todaytag"></span>
    </div>
    <div id="alertbar"></div>

    <!-- DASHBOARD -->
    <div class="view active" id="v-dashboard"></div>
    <!-- CARE CENTER -->
    <div class="view" id="v-care"></div>
    <!-- ADD -->
    <div class="view" id="v-add"></div>
    <!-- LIST -->
    <div class="view" id="v-list"></div>
    <!-- TODAY -->
    <div class="view" id="v-today"></div>
    <!-- REPORT -->
    <div class="view" id="v-report"></div>
    <!-- MARKETING -->
    <div class="view" id="v-marketing"></div>
    <!-- TEAM -->
    <div class="view" id="v-team"></div>
    <!-- LICH LAM -->
    <div class="view" id="v-lichlam"></div>
    <!-- SETTINGS -->
    <div class="view" id="v-settings"></div>
    <!-- PERMS -->
    <div class="view" id="v-perms"></div>
    <!-- TRASH -->
    <div class="view" id="v-trash"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============ DỮ LIỆU MẪU ============ */
const USERS = {
  owner:{pass:'123', name:'Chủ tài khoản', role:'owner', id:'OWN'},
  admin:{pass:'123', name:'Quản lý (Admin)', role:'admin', id:'A'},
  bao:  {pass:'123', name:'Bảo',    role:'sale', id:'bao'},
  phuc: {pass:'123', name:'Phúc',   role:'sale', id:'phuc'},
  tien: {pass:'123', name:'Tiên',   role:'sale', id:'tien'},
  ttien:{pass:'123', name:'T.Tiên', role:'sale', id:'ttien'},
  hoe:  {pass:'123', name:'Hòe',    role:'sale', id:'hoe'},
  yen:  {pass:'123', name:'Yến',    role:'sale', id:'yen'},
  nguyet:{pass:'123', name:'Nguyệt', role:'marketing', id:'nguyet'},
  duy:  {pass:'123', name:'Duy',    role:'marketing', id:'duy'},
  viet: {pass:'123', name:'Việt',   role:'marketing', id:'viet'},
};
const SALES = {bao:'Bảo', phuc:'Phúc', tien:'Tiên', ttien:'T.Tiên', hoe:'Hòe', yen:'Yến'};
/* Danh mục sản phẩm chuẩn AGO — đồng bộ tên để dễ phân tích sau này (nguồn: agofertility.com) */
const AGO_SP = ['AGO Mom','AGO Eva','AGO Dad','AGO Tumor','AGO Women','AGO Mama','AGO Beauty','AGO Men','AGO Hau Bien','Eva Herblux','Xmen Herblux','U Xo Herblux','Tien Liet Tuyen Herblux','Ich Than Herblux','De Khang Herblux','Ovagen','A12 Mom','Tue Tinh Nang','Bach Trinh Nu','Chill Polytic','Dieu Kinh ND AMH','Mau Nguyet Da','Mau Nguyet Da +','Tieu Nang Da','VSHM Tue Tinh','Manh Luc Da','Manh Luc Da +','Omega','Xong Phu Huong Da','Xit Phu Huong Da'];
function spDatalist(){ return '<datalist id="ago-sp-list">'+AGO_SP.map(s=>`<option value="${s}">`).join('')+'</datalist>'; }
function spChips(inputId){ return '<div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:6px">'+AGO_SP.map(s=>`<button type="button" onclick="addSP('${inputId}','${s.replace(/'/g,"\\'")}')" style="font-size:11px;padding:3px 9px;border:1px solid var(--line);border-radius:20px;background:#fff;cursor:pointer">${s}</button>`).join('')+'</div>'; }
function addSP(inputId,name){ const el=document.getElementById(inputId); if(!el) return; const v=el.value.trim(); el.value = v ? (v.replace(/\s*\+?\s*$/,'')+' + 1 '+name) : ('1 '+name); el.focus(); }
function addSpPick(){ const p=document.getElementById('f-sppick'); const q=document.getElementById('f-spqty'); const el=document.getElementById('f-sp'); if(!p||!el)return; const name=p.value; const qty=q&&q.value?q.value:1; const v=el.value.trim(); el.value = v ? (v.replace(/\s*\+?\s*$/,'')+' + '+qty+' '+name) : (qty+' '+name); }
// Tất cả các mục có thể phân quyền
const ALL_MODULES = [
  ['dashboard','Dashboard'],['care','Trung tâm chăm sóc'],['add','Thêm khách'],
  ['list','Danh sách khách'],['today','Việc cần làm'],['report','Báo cáo'],
  ['marketing','BC Marketing'],['team','Sale team'],['lichlam','Đăng ký lịch làm'],['settings','Cài đặt'],['perms','Phân quyền'],['trash','Thùng rác'],
];
// Quyền mặc định theo VAI TRÒ (dùng khi tạo tài khoản mới)
const DEFAULT_PERMS = {
  admin:['dashboard','care','add','list','today','report','marketing','team','lichlam','settings','perms','trash'],
  sale: ['dashboard','care','add','list','today','lichlam'],
  marketing:['dashboard','care','list','marketing','lichlam'],
};
// Quyền hiện tại của từng tài khoản — Admin/Chủ chỉnh trên trang Tài khoản & Phân quyền
let PERMS = {
  owner:['dashboard','care','add','list','today','report','marketing','team','settings','perms','trash'],
  admin:['dashboard','care','add','list','today','report','marketing','team','settings','perms','trash'],
  bao:  ['dashboard','care','add','list','today'],
  phuc: ['dashboard','care','add','list','today'],
  tien: ['dashboard','care','add','list','today'],
  ttien:['dashboard','care','add','list','today'],
  hoe:  ['dashboard','care','add','list','today'],
  yen:  ['dashboard','care','add','list','today'],
  nguyet:['dashboard','care','list','marketing'],
  duy:  ['dashboard','care','list','marketing'],
  viet: ['dashboard','care','list','marketing'],
};
const _now = new Date();
const today = new Date(Date.UTC(_now.getFullYear(), _now.getMonth(), _now.getDate())); // ngày hiện tại (tự cập nhật mỗi ngày)
const D = n => { const d=new Date(today); d.setDate(d.getDate()+n);
  return d.toISOString().slice(0,10); };

const STATUS = {kcnc:'KCNC',ktt:'KTT',tuong_tac:'TƯƠNG TÁC',web:'WEB',
  khach_chan:'KHÁCH CHẶN',da_chot:'CHỐT NÓNG',chot_nguoi:'CHỐT NGUỘI',dang_care:'ĐANG CARE',hen:'HẸN'};
const CHOT_TT=['da_chot','chot_nguoi']; const isChot=tt=>CHOT_TT.includes(tt);
const BENH = {pcos:'PCOS',u_xo:'U xơ tử cung',tac_voi:'Tắc vòi trứng',amh_thap:'AMH thấp',
  noi_tiet:'Nội tiết kém',tinh_trung_yeu:'Tinh trùng yếu',muon_thai:'Muốn có thai tự nhiên',khac:'Khác'};
const NGUON = {facebook:'Facebook',tiktok:'TikTok',pancake:'Pancake',website:'Website',whatsapp:'WhatsApp',khac:'Khác'};

/* Nhân sự MKT (người kéo lead) */
const MKT = {nguyet:'Nguyệt', duy:'Duy', viet:'Việt'};

/* ====== BẢN TRẮNG ======
   Chưa có khách hàng. Chị nhập sau bằng:
   • nút "📥 Nhập file" (Excel/CSV) trong trang Thêm khách hàng, hoặc
   • form "Thêm khách hàng" để nhập tay từng khách.
   Team (Sale/MKT) đã được thiết lập sẵn. */
let DATA = [];

/* Chi phí marketing theo nguồn + MKT (USD) - demo */
let SPEND = [];  // chưa có chi phí marketing — nhập ở trang Báo cáo Marketing
let MREPORTS = []; // báo cáo marketing theo page/camp: {id,owner,ngay,ten_page,camp,tien,sl_mes,so_cmt,mes_tt,sd_chot}
let MTRASH = [];   // báo cáo marketing đã xoá (có thể khôi phục)

/* ============ AUTH ============ */
let ME = null;
let TRASH = [];  // khách đã xoá (chỉ admin xem & khôi phục)
let ORDERS = {};  // lịch sử mua hàng theo khách: { customer_id: [ {id,ngay,san_pham,so_tien} ] }
let TASKS = [];   // việc cần làm / nhắc việc
let TARGETS = {}; // mục tiêu DT theo tháng: { 'owner|YYYY-MM': muc_tieu }
let REPORT_MONTH = (new Date()).toISOString().slice(0,7); // tháng đang xem ở Báo cáo
let TASK_Q = '';  // bộ lọc tên khách ở trang Việc cần làm
function setTaskQ(v){ TASK_Q=v; renderToday(); const el=document.getElementById('tk-q'); if(el){ el.focus(); try{el.setSelectionRange(v.length,v.length);}catch(e){} } }
let TASK_SALE='', TASK_FROM='', TASK_TO='';
function setTaskSale(v){ TASK_SALE=v; renderToday(); }
function setTaskFrom(v){ TASK_FROM=v; renderToday(); }
function setTaskTo(v){ TASK_TO=v; renderToday(); }
function clearTaskFilters(){ TASK_Q=''; TASK_SALE=''; TASK_FROM=''; TASK_TO=''; renderToday(); }
let DONE_Q='', DONE_SALE='', DONE_FROM='', DONE_TO='';
function setDoneQ(v){ DONE_Q=v; renderToday(); const el=document.getElementById('dn-q'); if(el){ el.focus(); try{el.setSelectionRange(v.length,v.length);}catch(e){} } }
function setDoneSale(v){ DONE_SALE=v; renderToday(); }
function setDoneFrom(v){ DONE_FROM=v; renderToday(); }
function setDoneTo(v){ DONE_TO=v; renderToday(); }
function clearDoneFilters(){ DONE_Q=''; DONE_SALE=''; DONE_FROM=''; DONE_TO=''; renderToday(); }
async function followDone(id){ const c=findC(id); if(!c) return; const { error }=await sb.from('customers').update({ follow:D(3), ngay_capnhat:D(0) }).eq('id', id); if(error){ alert(error.message); return; } await loadAll(); renderToday(); }
let TASK_BUCKET='', TASK_PANEL_OPEN=false, CARE_TODAY_OPEN=false; // lọc nhanh nhóm việc + thu gọn form & bảng chăm
function setTaskBucket(v){ TASK_BUCKET=v; renderToday(); }
function toggleTaskPanel(){ TASK_PANEL_OPEN=!TASK_PANEL_OPEN; renderToday(); }
function toggleCareToday(){ CARE_TODAY_OPEN=!CARE_TODAY_OPEN; renderToday(); }
let CARE_TODAY_Q='', CARE_TODAY_SALE='', CARE_TODAY_MKT='';  // bộ lọc bảng "Lịch chăm khách đã chốt" ở trang Việc cần làm
function setCareTodayQ(v){ CARE_TODAY_Q=v; renderToday(); const el=document.getElementById('cct-q'); if(el){ el.focus(); try{el.setSelectionRange(v.length,v.length);}catch(e){} } }
function setCareTodaySale(v){ CARE_TODAY_SALE=v; renderToday(); }
function setCareTodayMkt(v){ CARE_TODAY_MKT=v; renderToday(); }
let CARE_TODAY_FROM='', CARE_TODAY_TO='';
function setCareTodayFrom(v){ CARE_TODAY_FROM=v; renderToday(); }
function setCareTodayTo(v){ CARE_TODAY_TO=v; renderToday(); }
function clearCareTodayDate(){ CARE_TODAY_FROM=''; CARE_TODAY_TO=''; renderToday(); }
// Bộ lọc khoảng ngày dùng chung cho nhiều trang (mỗi trang 1 state)
const FILTERS = {
  dash:  { start:null, end:null, field:'lendon', open:false, calBase:null, def:'thang_nay' },
  list:  { start:null, end:null, field:'lendon', open:false, calBase:null, def:'all' },
  report:{ start:null, end:null, field:'lendon', open:false, calBase:null, def:'all' },
  mkt:   { start:null, end:null, field:'lendon', open:false, calBase:null, def:'all' },
  team:  { start:null, end:null, field:'lendon', open:false, calBase:null, def:'all' },
};
function login(){
  const u=document.getElementById('u').value.trim().toLowerCase();
  const p=document.getElementById('p').value.trim();

function flag(c){
  if(isChot(c.tt)) return 'won';
  if(!c.follow) return '';
  if(c.follow < D(-1)) return 'over';   // quá hạn ≥2 ngày
  if(c.follow < D(0))  return 'over';   // quá hạn 1 ngày
  if(c.follow === D(0))return 'warn';   // đến hạn hôm nay
  return '';
}

  if(c.muc==='nong'&&!isChot(c.tt)) cls+=' row-hot';

}

/* ===== PANEL CHĂM SÓC CHI TIẾT (mốc tự động + nhật ký) ===== */
let CARE_PANEL_ID=null;
function getCham(c){ let d=c.cham_data; if(typeof d==='string'){ try{d=JSON.parse(d);}catch(e){d=null;} }
  if(!d||typeof d!=='object') d={moc:[],log:[]}; if(!Array.isArray(d.moc)) d.moc=[]; if(!Array.isArray(d.log)) d.log=[]; return d; }
function addMonths(dstr,n){ const b=new Date((dstr||D(0))+'T00:00:00'); b.setMonth(b.getMonth()+n); return b.toISOString().slice(0,10); }
function ensureMoc(c,d){ if(d.moc.length) return false; const base=c.ngay_chot||D(0);
  d.moc=[ {key:'l1',label:'Trạng thái khách hàng lần 1',han:addMonths(base,1),done:false,note:''},
    {key:'l2',label:'Trạng thái khách hàng lần 2',han:addMonths(base,2),done:false,note:''},
    {key:'l3',label:'Trạng thái khách hàng lần 3',han:addMonths(base,3),done:false,note:''},
    {key:'up',label:'Up liệu trình mới',han:addMonths(base,4),done:false,note:'',isUp:true,upStatus:''} ]; return true; }
async function saveCham(id,d){ const c=DATA.find(x=>String(x.id)===String(id)); if(c) c.cham_data=d;
  if(!window.sb) return; const {error}=await sb.from('customers').update({cham_data:d}).eq('id',id);
  if(error){ console.warn('cham_data',error.message); if(/cham_data/.test(error.message||'')) alert('⚠️ Chưa có cột cham_data trên Supabase. Chạy SQL:\nalter table customers add column if not exists cham_data jsonb;'); } }
function careLog(d,text){ d.log.push({at:D(0),who:(ME&&ME.name)||'',text}); }
function mocStatus(m){ if(m.done) return {label:'Đã xong',color:'var(--won)',bg:''};
  const t=D(0); if(m.han&&m.han<t) return {label:'Quá hạn',color:'var(--over)',bg:'#fff5f5'};
  if(m.han===t) return {label:'Đến hạn',color:'#b07d00',bg:'#fffaf0'}; return {label:'Chưa tới',color:'var(--muted)',bg:''}; }
function openCarePanel(id){ const c=DATA.find(x=>String(x.id)===String(id)); if(!c){alert('Không tìm thấy khách.');return;}
  CARE_PANEL_ID=id; const d=getCham(c); if(ensureMoc(c,d)) saveCham(id,d); renderCarePanel(); }
function closeCarePanel(){ const ov=document.getElementById('care-overlay'); if(ov) ov.style.display='none'; CARE_PANEL_ID=null; }
function careMocToggle(key){ const c=DATA.find(x=>String(x.id)===String(CARE_PANEL_ID)); if(!c) return; const d=getCham(c);
  const m=d.moc.find(x=>x.key===key); if(!m) return; m.done=!m.done; m.done_at=m.done?D(0):'';
  careLog(d,(m.done?'✅ ':'↩ ')+m.label+(m.note?': '+m.note:'')); saveCham(c.id,d); renderCarePanel(); }
function careMocNote(key,val){ const c=DATA.find(x=>String(x.id)===String(CARE_PANEL_ID)); if(!c) return; const d=getCham(c);
  const m=d.moc.find(x=>x.key===key); if(!m) return; m.note=val; saveCham(c.id,d); }
async function careDebtSave(field,val){ const c=DATA.find(x=>String(x.id)===String(CARE_PANEL_ID)); if(!c) return;
  const v=(field==='ngay_thu_no')?(val||null):(Number(val)||0); c[field]=v;
  if(window.sb){ const {error}=await sb.from('customers').update({[field]:v}).eq('id',c.id); if(error){ alert('Lưu lỗi: '+error.message); return; } }
  renderCarePanel(); }
function careUp(key,action){ const c=DATA.find(x=>String(x.id)===String(CARE_PANEL_ID)); if(!c) return; const d=getCham(c);
  const m=d.moc.find(x=>x.key===key); if(!m) return; const map={lenmoi:'🎯 Lên liệu trình mới',theodoi:'👁 Theo dõi thêm',tubo:'✖ Từ bỏ'};
  m.upStatus=map[action]||''; m.done=(action!=='theodoi'); m.done_at=m.done?D(0):'';
  careLog(d,map[action]+(m.note?': '+m.note:'')); saveCham(c.id,d); renderCarePanel(); }
function renderCarePanel(){ const c=DATA.find(x=>String(x.id)===String(CARE_PANEL_ID)); if(!c) return; const d=getCham(c);
  let ov=document.getElementById('care-overlay');
  if(!ov){ ov=document.createElement('div'); ov.id='care-overlay'; ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:210;display:flex;align-items:flex-start;justify-content:center;overflow:auto;padding:24px'; document.body.appendChild(ov); }
  ov.style.display='flex';
  const anyOver=d.moc.some(m=>!m.done&&m.han&&m.han<D(0));
  const headBadge=anyOver?`<span style="color:var(--over);font-weight:700">● Quá hạn</span>`:`<span style="color:var(--won);font-weight:700">● Đang chăm</span>`;
  const mocCards=d.moc.map(m=>{ const st=mocStatus(m);
    const btns=m.isUp?`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
        <button class="btn" type="button" style="background:#2f7d6e;padding:7px 12px" onclick="careUp('${m.key}','lenmoi')">🎯 Lên liệu trình mới</button>

document.getElementById('nav').addEventListener('click',e=>{
  const a=e.target.closest('a'); if(!a)return; go(a.dataset.v);
});
function go(v){
  let view=v;
  if(v==='list_chot'){view='list';LIST_MODE='chot';}
  else if(v==='list_chua'){view='list';LIST_MODE='chua';}
  else if(v==='list_all'){view='list';LIST_MODE='all';}
  else if(v==='list'){LIST_MODE='all';}
  document.querySelectorAll('#nav a').forEach(a=>a.classList.toggle('active',a.dataset.v===v));
  document.getElementById('app').classList.remove('navopen');
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  document.getElementById('v-'+view).classList.add('active');
  document.getElementById('title').textContent=TITLES[v]||TITLES[view];
  if(view==='list') renderList();
  else if(view==='care') renderCare();
  else if(view==='today') renderToday();

}

function saleStats(sd, rg){
  rg = rg || {s:'0000-01-01', e:'9999-12-31'};
  const inR = ds => { ds=(''+(ds||'')).slice(0,10); return ds>=rg.s && ds<=rg.e; };
  // Khách trong kỳ (theo Ngày lên đơn) — dùng cho Số khách & tỷ lệ
  const sdR=sd.filter(c=>inR(c.ngay_chot||c.ngay_tao));
  const total=sdR.length;
  const interacted=sdR.filter(c=>['ktt','tuong_tac','dang_care','hen','da_chot','chot_nguoi'].includes(c.tt)).length;
  const won=sdR.filter(c=>isChot(c.tt));
  const markets=[...new Set(sdR.map(c=>c.quoc_gia).filter(Boolean))];
  const no=sdR.reduce((s,c)=>s+(Number(c.no_goc)||0),0);
  // Doanh thu tính theo TỪNG lần mua trong kỳ (KHÔNG gộp cả lịch sử vào tháng chốt)
  let dtMoi=0, dtCu=0, dtVND=0;
  sd.forEach(c=>{
    const r=rateVN(c);
    if(isChot(c.tt)){
      const amt=Number(c.dt)||0;
      if(amt>0 && inR(c.ngay_chot||c.ngay_tao)){ if(c.loai_don==='upsell') dtCu+=amt; else dtMoi+=amt; dtVND+=amt*r; }
    }
    ordersOf(c).forEach(o=>{ const amt=Number(o.so_tien)||0; if(amt>0 && inR(o.ngay)){ dtCu+=amt; dtVND+=amt*r; } });
  });
  return {total, won:won.length, dtMoi, dtCu, dtTong:dtMoi+dtCu, no, dtVND, markets,
    rTuongtac: total?Math.round(interacted/total*100):0,
    rChot: total?Math.round(won.length/total*100):0};
}

/* ====== TRUNG TÂM CHĂM SÓC THÔNG MINH ====== */
function careScore(c){            // điểm càng cao = càng gấp
  if(['da_chot','chot_nguoi','khach_chan'].includes(c.tt)) return -1;
  let s=0; const f=flag(c);
  if(f==='over'){ s+=50; const days=Math.round((new Date(D(0))-new Date(c.follow))/86400000); s+=Math.min(days*5,20); }
  if(f==='warn') s+=22;
  if(c.muc==='nong') s+=25;
  if(c.khach_cu && c.ngay_upsale && c.ngay_upsale<=D(0)) s+=30;
  if(c.tt==='moi_vao') s+=18;
  if(c.tt==='da_bao_gia') s+=15;
  if(c.tt==='da_tu_van') s+=10;
  if(c.tt==='khong_phan_hoi') s+=8;
  return s;
}
function nextAction(c){
  const f=flag(c);
  if(c.khach_cu && c.ngay_upsale && c.ngay_upsale<=D(0)) return '⬆️ Nhắc khách cũ mua lại / nâng combo';
  if(f==='over') return '📞 GỌI NGAY — quá hạn follow';
  if(c.muc==='nong') return '🔥 Ưu tiên chốt khách nóng';
  if(c.tt==='da_bao_gia') return '💰 Chốt đơn — đã báo giá';
  if(c.tt==='moi_vao') return '🌱 Tư vấn khách mới (bước 1 lộ trình)';
  if(c.tt==='da_tu_van') return '📝 Gửi báo giá';
  if(f==='warn') return '⏰ Follow theo lịch hẹn';
  if(c.tt==='khong_phan_hoi') return '🔁 Nhắn lại / đổi kênh liên hệ';
  return '👀 Theo dõi tiếp';
}
/* Sản phẩm AGO phù hợp theo bệnh lý/nhu cầu */
const SP_GOI = {pcos:'AGO WOMEN', amh_thap:'AGO EVA', u_xo:'AGO TUMOR', tac_voi:'AGO EVA',
  noi_tiet:'AGO WOMEN', tinh_trung_yeu:'AGO DAD', muon_thai:'AGO MOM', khac:''};

/* Gợi ý việc cần làm cụ thể cho TỪNG khách (tối đa ~5 ý) */
function careSuggestions(c){
  const out=[]; const f=flag(c); const sp=SP_GOI[c.benh]||c.sp;
  // 1. Quá hạn -> nhắc xử lý trước
  if(f==='over') out.push('⚠️ Đã quá hạn — liên hệ lại NGAY, mở lời nhẹ nhàng vì phản hồi muộn.');
  // 2. Up-sale khách cũ đến hạn
  if(c.khach_cu && c.ngay_upsale && c.ngay_upsale<=D(0)){
    out.push('Hỏi thăm kết quả/cảm nhận sau liệu trình trước.');
    out.push('Đề xuất mua lại hoặc nâng combo phù hợp giai đoạn hiện tại'+(sp?` (gợi ý: ${sp}).`:'.'));
  }
  // 3. Theo trạng thái
  if(c.tt==='moi_vao'){
    out.push('Phản hồi trong 5 phút đầu + cảm ơn khách đã quan tâm.');
    out.push(`Hỏi rõ tình trạng/nhu cầu (${BENH[c.benh]||'nhu cầu'}) để tư vấn đúng.`);
    out.push('Gửi tài liệu giới thiệu + review khách thật'+(sp?` về ${sp}.`:'.'));
  } else if(c.tt==='da_tu_van'){
    out.push('Chốt lại nhu cầu chính & ngân sách của khách.');
    out.push('Gửi báo giá + ưu đãi combo phù hợp'+(sp?` (${sp}).`:'.'));
    out.push('Hẹn ngày phản hồi cụ thể (đặt lịch follow).');
  } else if(c.tt==='da_bao_gia'){
    out.push('Hỏi khách còn băn khoăn gì: giá / niềm tin / cần hỏi chồng.');
    out.push('Đưa lý do chốt ngay: ưu đãi có hạn, lộ trình theo tháng, suất tư vấn.');
    out.push('Hướng dẫn cách đặt cọc / thanh toán để chốt đơn.');
  } else if(c.tt==='hen_follow'){
    out.push('Liên hệ đúng lịch hẹn, mở đầu bằng điều khách quan tâm lần trước.');
    out.push('Nhắc lại lợi ích chính & ưu đãi còn hiệu lực.');
  } else if(c.tt==='khong_phan_hoi'){
    out.push('Đổi kênh liên hệ (WhatsApp / gọi / email).');
    out.push(`Nhắn tin giá trị, không spam: chia sẻ case tương tự (${BENH[c.benh]||'nhu cầu'}).`);
    out.push('Sau 2 lần không phản hồi → hạ mức độ & dời lịch follow xa hơn.');
  }
  // 4. Theo mức độ
  if(c.muc==='nong') out.push('🔥 Khách nóng: ưu tiên đẩy nhanh tới bước chốt trong hôm nay.');
  if(c.muc==='lanh') out.push('Khách lạnh: nuôi dưỡng dài hạn, thêm vào danh sách gửi nội dung định kỳ.');
  // 5. Thiếu thông tin liên hệ
  if(!c.phone && !c.email) out.push('Bổ sung SĐT/WhatsApp hoặc email để chăm sóc được.');
  return out.slice(0,5);
}

function addToDate(str,n){ if(!str) return ''; const d=new Date(str+'T00:00:00Z'); if(isNaN(d)) return ''; d.setUTCDate(d.getUTCDate()+n); return d.toISOString().slice(0,10); }
function careCell(base,a,b){
  if(!base) return '<span style="color:var(--line)">—</span>';
  const s=addToDate(base,a), e=addToDate(base,b), t=D(0);
  const due = t>=s && t<=e, over = t>e;
  const col = due?'#b07d00':(over?'var(--muted)':'var(--text)');
  return `<span style="color:${col};${due?'font-weight:700':''}">${s} → ${e}</span>${due?' ⏰':''}`;
}

function checkDupAdd(){
  var w=document.getElementById('dup-warn'); if(!w) return;
  var tenEl=document.getElementById('f-ten'), phEl=document.getElementById('f-phone'), emEl=document.getElementById('f-email');
  var ten=((tenEl&&tenEl.value)||'').trim().toLowerCase();
  var ph=((phEl&&phEl.value)||'').replace(/\D/g,'');
  var em=((emEl&&emEl.value)||'').trim().toLowerCase();
  if(ten.length<2 && ph.length<8 && !em){ w.style.display='none'; w.innerHTML=''; return; }
  var m=(DATA||[]).filter(function(c){ if(c.da_xoa) return false;
    var cn=(''+(c.ten||'')).trim().toLowerCase(), cp=(''+(c.phone||'')).replace(/\D/g,''), ce=(''+(c.email||'')).trim().toLowerCase();
    return (ten.length>=2&&cn===ten) || (ph.length>=8&&cp===ph) || (em&&ce===em); });
  if(!m.length){ w.style.display='none'; w.innerHTML=''; return; }
  var lines=m.slice(0,6).map(function(c){
    var cn=(''+(c.ten||'')).trim().toLowerCase(), cp=(''+(c.phone||'')).replace(/\D/g,'');
    var by=(cn===ten)?'trùng TÊN':((ph.length>=8&&cp===ph)?'trùng SĐT':'trùng email');
    return '• '+esc(c.ten)+(c.phone?' ('+esc(c.phone)+')':'')+' — '+by+' · Sale <b>'+esc(SALES[c.owner]||'?')+'</b> · '+esc(STATUS[c.tt]||c.tt)+' · đã mua '+soLanMua(c)+' lần';
  });
  w.style.display='block';
  w.innerHTML='⚠️ <b>CẢNH BÁO TRÙNG KHÁCH ('+m.length+')</b> — đã có trong hệ thống, kiểm tra trước khi lưu:<br>'+lines.join('<br>');
}

function revFind(map,text){ if(!text)return ''; const t=(''+text).trim().toLowerCase();

function importExcel(){
  const f=document.getElementById('xls-file').files[0];
  if(!f){ alert('Chọn file Excel/CSV trước.'); return; }
  const rd=new FileReader();
  rd.onload=ev=>{
    try{
      const wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
      let n=0;
      rows.forEach(r=>{
        const get=(...keys)=>{ for(const k of keys){ const kk=Object.keys(r).find(h=>(''+h).trim().toLowerCase()===k.toLowerCase());
          if(kk!==undefined && r[kk]!=='') return (''+r[kk]).trim(); } return ''; };
        const ten=get('Tên khách hàng','Tên','Name'); if(!ten) return;
        const mucT=get('Mức độ','Mức').toLowerCase();
        const muc= (mucT.includes('nóng')||mucT==='nong')?'nong' : (mucT.includes('lạnh')||mucT==='lanh')?'lanh':'am';
        const benhT=get('Bệnh lý','Bệnh lý / nhu cầu','Nhu cầu');
        const benhKeys=benhT.split(/[;,\/]/).map(s=>revFind(BENH,s.trim())).filter(Boolean);
        const waT=get('WhatsApp','Đã có WhatsApp').toLowerCase();
        const tt=revFind(STATUS,get('Trạng thái'))||'tuong_tac';
        const c={ id:Date.now()+n,
          owner: revFind(SALES,get('Sale','Sale chăm khách')) || (ME.role==='sale'?ME.id:Object.keys(SALES)[0]),
          mkt: revFind(MKT,get('MKT','MKT phụ trách')) || Object.keys(MKT)[0],
          ten, phone:get('Số điện thoại','SĐT','Số điện thoại / WhatsApp','Phone'),
          has_wa:['có','x','yes','true','1','đã có'].includes(waT),
          email:get('Email'), quoc_gia:get('Quốc gia','Thị trường','Country'),
          nguon:revFind(NGUON,get('Nguồn','Nguồn khách'))||'khac',
          benh:benhKeys[0]||'khac', benh_list:benhKeys.map(k=>BENH[k]).join(', ')||benhT,
          sp:get('Sản phẩm','Sản phẩm quan tâm')||'—',
          muc, tt, follow:normDate(get('Ngày follow','Ngày cần follow tiếp theo')),
          ghi:get('Ghi chú','Ghi chú tư vấn'), dt:Number(get('Doanh thu','Doanh thu (USD)'))||0,
          ly:'', khach_cu:false, ngay_tao:D(0), ngay_capnhat:D(0) };
        if(isChot(c.tt)) c.loai_don='moi';
        DATA.unshift(c); n++;
      });
      alert('✅ Đã nhập '+n+' khách hàng từ file.');
      document.getElementById('xls-file').value='';
      renderAll(); go('list');
    }catch(err){ alert('Lỗi đọc file: '+err.message); }
  };
  rd.readAsArrayBuffer(f);
}

const LIST_COLS=[{k:'qg',label:'Quốc gia'},{k:'nguon',label:'Nguồn'},{k:'benh',label:'Bệnh lý'},{k:'sp',label:'SP'},{k:'muc',label:'Mức'},{k:'tt',label:'Trạng thái'},{k:'follow',label:'Follow'},{k:'mkt',label:'MKT'},{k:'sale',label:'Sale'},{k:'ghi',label:'Ghi chú / Việc'},{k:'dt',label:'DT'},{k:'tiengoc',label:'Tiền gốc'},{k:'nogoc',label:'Nợ gốc'},{k:'thuno',label:'Ngày thu nợ'}];

function applyColVis(){ const css=LIST_COLS.filter(c=>COL_HIDE[c.k]).map(c=>`#list-table .c-${c.k}{display:none}`).join(''); let st=document.getElementById('col-vis-style'); if(!st){st=document.createElement('style');st.id='col-vis-style';document.head.appendChild(st);} st.textContent=css; }
function toggleCol(k){ COL_HIDE[k]=!COL_HIDE[k]; try{localStorage.setItem('ccp_col_hide',JSON.stringify(COL_HIDE));}catch(e){} applyColVis(); }
function countryGroup(q){ q=(q||'').toUpperCase().trim().replace(/[.\s]/g,'');
  if(['US','USA','UNITEDSTATES','MỸ','MY'].includes(q)) return 'US';
  if(['CA','CAD','CAN','CANADA'].includes(q)) return 'Canada';
  if(['EU','EUR','EURO','EUROPE','DE','FR','IT','ES','NL','BE','AT','PT','IE','FI','GR','LU','SK','SI','EE','LV','LT','CY','MT','HR','UK','GB','CH','SE','NO','DK','PL','CZ'].includes(q)) return 'Euro';
  return 'Khác'; }
function curSym(c){ const g=countryGroup(c&&c.quoc_gia); return g==='Euro'?'€':g==='Canada'?'CA$':'$'; }
const RATE_VN={US:23500,Canada:16000,Euro:24500}; // tỷ giá quy đổi sang VNĐ
function rateVN(c){ const g=countryGroup(c&&c.quoc_gia); return RATE_VN[g]||23500; } // Khác: tạm dùng tỷ giá USD
function fmtCur(c,n){ n=Number(n)||0; return curSym(c)+n.toLocaleString('en-US'); }
function renderRevenue(allRows){ const el=document.getElementById('list-revenue'); if(!el) return;
  const rg=getRange('list'); const field=FILTERS.list.field;
  const inR=ds=>{ ds=(''+(ds||'')).slice(0,10); return ds>=rg.s && ds<=rg.e; };
  const rev={US:{n:0,s:0},Canada:{n:0,s:0},Euro:{n:0,s:0},'Khác':{n:0,s:0}};
  const seen={US:new Set(),Canada:new Set(),Euro:new Set(),'Khác':new Set()};
  let tot=0; const custSet=new Set();
  allRows.filter(c=>isChot(c.tt)).forEach(c=>{ const g=countryGroup(c.quoc_gia); let amt=0;
    if(field==='lendon'){
      if(inR(c.ngay_chot||c.ngay_tao)) amt+=Number(c.dt)||0;
      ordersOf(c).forEach(o=>{ if(inR(o.ngay)) amt+=Number(o.so_tien)||0; });
    } else { amt=tongChiTieu(c); }
    if(amt>0){ rev[g].s+=amt; if(!seen[g].has(c.id)){seen[g].add(c.id); rev[g].n++;} tot+=amt; custSet.add(c.id); }
  });
  const rows={length:custSet.size};
  const noRows=allRows.filter(c=>Number(c.no_goc)>0);
  const totNo=noRows.reduce((a,c)=>a+(Number(c.no_goc)||0),0);
  const cards=[['US','🇺🇸 US'],['Canada','🇨🇦 Canada'],['Euro','🇪🇺 Euro'],['Khác','🌍 Khác']]
    .filter(([k])=>rev[k].n>0||k!=='Khác')
    .map(([k,lbl])=>`<div class="rev-card"><div class="rl">${lbl}</div><div class="rv">$${rev[k].s.toLocaleString('en-US')}</div><div class="rn">${rev[k].n} khách</div></div>`).join('');
  el.innerHTML=`<div class="rev-grid">${cards}<div class="rev-card" style="background:var(--cream)"><div class="rl">💰 Tổng đã chốt</div><div class="rv">$${tot.toLocaleString('en-US')}</div><div class="rn">${rows.length} khách chốt</div></div><div class="rev-card" style="background:#fdeeee"><div class="rl">💳 Số nợ (nợ gốc)</div><div class="rv" style="color:var(--over)">$${totNo.toLocaleString('en-US')}</div><div class="rn">${noRows.length} khách còn nợ</div></div></div>`;
}

    if(doneAll.length){
      const drow=t=>{ const cn=taskCustName(t); const tc=DATA.find(x=>String(x.id)===String(t.customer_id));

      const dFil=`<div class="filters" style="margin:8px 0 10px"><input id="dn-q" class="search" value="${(DONE_Q||'').replace(/"/g,'&quot;')}" oninput="setDoneQ(this.value)" placeholder="🔎 Lọc tên khách / nội dung..." style="max-width:300px"><select onchange="setDoneSale(this.value)" style="width:auto"><option value="">Tất cả sale</option>${Object.entries(SALES).map(([k,v])=>`<option value="${k}" ${DONE_SALE===k?'selected':''}>${v}</option>`).join('')}</select><span style="font-size:12px;color:var(--muted)">Đến hạn:</span><input type="date" value="${DONE_FROM}" onchange="setDoneFrom(this.value)" title="Từ ngày" style="width:auto"><span style="color:var(--muted)">→</span><input type="date" value="${DONE_TO}" onchange="setDoneTo(this.value)" title="Đến ngày" style="width:auto">${(DONE_Q||DONE_SALE||DONE_FROM||DONE_TO)?`<button class="btn ghost" type="button" style="padding:4px 10px;font-size:12px" onclick="clearDoneFilters()">Xoá lọc</button>`:''}</div>`;
      html+=`<h2 class="sec" style="margin-top:18px;color:var(--won)">✅ Việc đã hoàn thành (${done.length}${done.length!==doneAll.length?' / '+doneAll.length:''})</h2><p style="color:var(--muted);font-size:12px;margin:-6px 0 8px">Bấm <b>Kích hoạt lại</b> để đưa việc về danh sách chưa làm — nhắc sale làm tiếp.</p>${dFil}<div class="card" style="padding:0;overflow-x:auto"><table><tr><th>Loại</th><th>Khách</th><th>Nội dung</th><th>Đến hạn</th><th>Sale</th><th></th></tr>${done.map(drow).join('')||'<tr><td colspan="6" class="empty">Không có việc khớp bộ lọc.</td></tr>'}</table></div>`;
    }
  }
  /* Nhắc follow đã được gộp vào nhóm "Quá hạn" / "Hôm nay" ở bảng việc phía trên */
  let careArr=DATA.filter(c=>isChot(c.tt)).sort((a,b)=>(b.ngay_chot||'').localeCompare(a.ngay_chot||''));
  const _cq=(CARE_TODAY_Q||'').toLowerCase();
  if(CARE_TODAY_SALE) careArr=careArr.filter(c=>c.owner===CARE_TODAY_SALE);
  if(CARE_TODAY_MKT) careArr=careArr.filter(c=>c.mkt===CARE_TODAY_MKT);
  if(CARE_TODAY_FROM) careArr=careArr.filter(c=>c.ngay_chot && c.ngay_chot>=CARE_TODAY_FROM);
  if(CARE_TODAY_TO) careArr=careArr.filter(c=>c.ngay_chot && c.ngay_chot<=CARE_TODAY_TO);
  if(_cq) careArr=careArr.filter(c=>`${c.ten||''} ${c.phone||''} ${c.su_dung||''} ${c.cham_kq||''} ${c.ghi||''}`.toLowerCase().includes(_cq));
  const cctSale=`<select onchange="setCareTodaySale(this.value)"><option value="">Tất cả sale</option>${Object.entries(SALES).map(([k,v])=>`<option value="${k}" ${CARE_TODAY_SALE===k?'selected':''}>${v}</option>`).join('')}</select>`;
  const cctMkt=`<select onchange="setCareTodayMkt(this.value)"><option value="">Tất cả MKT</option>${Object.entries(MKT).map(([k,v])=>`<option value="${k}" ${CARE_TODAY_MKT===k?'selected':''}>Khách của ${v}</option>`).join('')}</select>`;
  const cctDate=`<span style="font-size:12px;color:var(--muted)">Ngày chốt:</span><input type="date" value="${CARE_TODAY_FROM}" onchange="setCareTodayFrom(this.value)" title="Từ ngày" style="width:auto"><span style="color:var(--muted)">→</span><input type="date" value="${CARE_TODAY_TO}" onchange="setCareTodayTo(this.value)" title="Đến ngày" style="width:auto">${(CARE_TODAY_FROM||CARE_TODAY_TO)?`<button class="btn ghost" type="button" style="padding:4px 10px;font-size:12px" onclick="clearCareTodayDate()">Xoá lọc ngày</button>`:''}`;
  html+=`<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:26px"><h2 class="sec" style="margin:0">📋 Lịch chăm khách đã chốt (cả team)</h2><button class="btn ghost" type="button" onclick="toggleCareToday()" style="padding:5px 12px;font-size:12px">${CARE_TODAY_OPEN?'✕ Thu gọn':`Mở ra (${careArr.length})`}</button></div>`;
  if(CARE_TODAY_OPEN) html+=`<p style="color:var(--muted);font-size:12px;margin:8px 0 8px">💡 <b>Tự động lưu</b> trong lúc gõ (ngừng gõ ~1 giây là lưu) — hiện "✓ Đã lưu" ở góc phải. Bảng này cũng có ở trang <b>Chăm sóc khách</b>.</p>
    <div class="filters" style="margin-bottom:10px"><input id="cct-q" class="search" value="${(CARE_TODAY_Q||'').replace(/"/g,'&quot;')}" oninput="setCareTodayQ(this.value)" placeholder="🔎 Tìm tên / SĐT / ghi chú / kết quả..." style="max-width:420px">${cctSale}${cctMkt}${cctDate}</div>`+careTableHTML(careArr);
  document.getElementById('v-today').innerHTML=html;
}

/* ====== MỤC TIÊU DOANH THU THEO THÁNG ====== */
function monthDT(owner,ym){
  const inM=ds=>(''+(ds||'')).slice(0,7)===ym;
  let s=0;
  DATA.filter(c=>c.owner===owner).forEach(c=>{
    if(isChot(c.tt) && inM(c.ngay_chot||c.ngay_tao)) s+=Number(c.dt)||0;   // chốt mới (đơn đầu trong tháng)
    ordersOf(c).forEach(o=>{ if(inM(o.ngay)) s+=Number(o.so_tien)||0; });   // chăm sóc (đơn phụ trong tháng)
  });
  return s;
}
function setReportMonth(v){ if(v) REPORT_MONTH=v; renderReport(); }
async function saveTarget(owner){
  const el=document.getElementById('tg-'+owner); if(!el) return;
  const val=Number(el.value)||0;
  if(window.sb){
    const { error }=await sb.from('sale_targets').upsert({owner:owner, thang:REPORT_MONTH, muc_tieu:val},{onConflict:'owner,thang'});
    if(error){ alert('Lỗi lưu mục tiêu: '+error.message); return; }
  }
  TARGETS[owner+'|'+REPORT_MONTH]=val; renderReport();
}
let REPORT_DONUT_SALE='';
function setReportDonutSale(v){ REPORT_DONUT_SALE=v; renderReport(); }
function statusDonutHTML(arr){
  const order=['kcnc','ktt','tuong_tac','web','khach_chan','da_chot','chot_nguoi','dang_care','hen'];
  const cnt={}; let total=0;
  arr.forEach(c=>{ const k=order.includes(c.tt)?c.tt:'kcnc'; cnt[k]=(cnt[k]||0)+1; total++; });
  const segs=order.filter(k=>cnt[k]).map(k=>({k,n:cnt[k],pct: total?cnt[k]/total:0}));
  const C=439.82, r=70, cx=90, cy=90, sw=28; let acc=0, circles='';
  segs.forEach(s=>{ const len=s.pct*C; circles+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${TT_COLOR[s.k]||'#8a8f98'}" stroke-width="${sw}" stroke-dasharray="${len.toFixed(2)} ${(C-len).toFixed(2)}" stroke-dashoffset="${(-acc*C).toFixed(2)}" transform="rotate(-90 ${cx} ${cy})"></circle>`; acc+=s.pct; });
  const svg=`<svg viewBox="0 0 180 180" width="180" height="180" style="flex-shrink:0">${total?circles:`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#eee" stroke-width="${sw}"></circle>`}<text x="${cx}" y="${cy-2}" text-anchor="middle" font-size="32" font-weight="800" fill="var(--teal-dark)">${total}</text><text x="${cx}" y="${cy+20}" text-anchor="middle" font-size="12" fill="var(--muted)">khách</text></svg>`;
  const legend=segs.map(s=>`<div style="display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:7px"><span style="display:inline-block;width:13px;height:13px;border-radius:3px;background:${TT_COLOR[s.k]||'#8a8f98'};flex-shrink:0"></span><span style="flex:1">${(TT_ICON[s.k]||'')} ${STATUS[s.k]||s.k}</span><b>${s.n}</b><span style="color:var(--muted);width:48px;text-align:right">${Math.round(s.pct*100)}%</span></div>`).join('');
  return `<div style="display:flex;gap:28px;flex-wrap:wrap;align-items:center">${svg}<div style="flex:1;min-width:240px">${legend||'<span class="empty">Chưa có khách trong khoảng ngày này.</span>'}</div></div>`;
}
function marketDonutHTML(arr){
  const order=['US','Canada','Euro','Khác'];
  const label={US:'🇺🇸 US',Canada:'🇨🇦 Canada',Euro:'🇪🇺 Euro','Khác':'🌍 Khác'};
  const color={US:'#4a90a4',Canada:'#c25b56',Euro:'#2f7d6e','Khác':'#8a8f98'};
  const cnt={}; let total=0;
  arr.forEach(c=>{ const g=countryGroup(c.quoc_gia); cnt[g]=(cnt[g]||0)+1; total++; });
  const segs=order.filter(k=>cnt[k]).map(k=>({k,n:cnt[k],pct:total?cnt[k]/total:0}));
  const C=439.82,r=70,cx=90,cy=90,sw=28; let acc=0,circles='';
  segs.forEach(s=>{ const len=s.pct*C; circles+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color[s.k]}" stroke-width="${sw}" stroke-dasharray="${len.toFixed(2)} ${(C-len).toFixed(2)}" stroke-dashoffset="${(-acc*C).toFixed(2)}" transform="rotate(-90 ${cx} ${cy})"></circle>`; acc+=s.pct; });
  const svg=`<svg viewBox="0 0 180 180" width="160" height="160" style="flex-shrink:0">${total?circles:`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#eee" stroke-width="${sw}"></circle>`}<text x="${cx}" y="${cy-2}" text-anchor="middle" font-size="32" font-weight="800" fill="var(--teal-dark)">${total}</text><text x="${cx}" y="${cy+20}" text-anchor="middle" font-size="12" fill="var(--muted)">khách</text></svg>`;
  const legend=segs.slice().sort((a,b)=>b.n-a.n).map(s=>`<div style="display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:7px"><span style="display:inline-block;width:13px;height:13px;border-radius:3px;background:${color[s.k]};flex-shrink:0"></span><span style="flex:1">${label[s.k]}</span><b>${s.n}</b><span style="color:var(--muted);width:48px;text-align:right">${Math.round(s.pct*100)}%</span></div>`).join('');
  return `<div style="display:flex;gap:20px;flex-wrap:wrap;align-items:center">${svg}<div style="flex:1;min-width:200px">${legend||'<span class="empty">Chưa có khách trong khoảng ngày này.</span>'}</div></div>`;
}

      <td>${x.rTuongtac}%</td><td>${x.rChot}%</td><td>$${x.dtMoi}</td><td>$${x.dtCu}</td><td><b>$${x.dtTong}</b></td></tr>`;
  });
  html+=`<tr style="background:var(--cream);font-weight:700"><td>TỔNG</td><td>${T.total}</td><td colspan="3"></td><td>$${T.dtMoi}</td><td>$${T.dtCu}</td><td>$${T.dtMoi+T.dtCu}</td></tr></table></div>
    <p style="color:var(--muted);font-size:12px;margin-top:10px">📅 Số liệu theo khoảng ngày đã chọn (${rangeLabel('report')}). Bản thật sẽ tự gửi báo cáo mỗi sáng qua Telegram/email.</p>`;
  // ----- MỤC TIÊU DOANH THU THEO THÁNG -----
  html+=`<h2 class="sec" style="margin-top:24px">🎯 Mục tiêu doanh thu theo tháng</h2>
    <div style="margin-bottom:10px"><input type="month" value="${REPORT_MONTH}" onchange="setReportMonth(this.value)" style="width:auto;padding:8px 11px;border:1px solid var(--line);border-radius:9px;font-size:13px"></div>
    <div class="card" style="padding:0;overflow-x:auto"><table>
    <tr><th>Sale</th><th>Mục tiêu DT ($)</th><th>DT tổng tháng này</th><th>Hoàn thành</th></tr>`;
  let TT={tg:0,dt:0};
  const tgRows = Object.entries(SALES); // mục tiêu công khai: ai cũng thấy của cả team
  tgRows.forEach(([id,name])=>{
    const tg=TARGETS[id+'|'+REPORT_MONTH]||0; const dt=monthDT(id,REPORT_MONTH);
    TT.tg+=tg; TT.dt+=dt;
    const pct=tg?Math.round(dt/tg*100):0;
    const col=pct>=100?'var(--won)':(pct>=60?'#b07d00':'var(--over)');
    html+=`<tr><td><b>${name}</b></td>
      <td><input id="tg-${id}" type="number" min="0" value="${tg||''}" placeholder="0" onchange="saveTarget('${id}')" style="width:120px;padding:6px 8px;border:1px solid var(--line);border-radius:8px"></td>
      <td>$${dt}</td>
      <td><div class="bar" style="width:90px;display:inline-block;vertical-align:middle"><div style="width:${Math.min(100,pct)}%;background:${col}"></div></div> <b style="color:${col}">${tg?pct+'%':'—'}</b></td></tr>`;
  });
  const pctT=TT.tg?Math.round(TT.dt/TT.tg*100):0;
  html+=`<tr style="background:var(--cream);font-weight:700"><td>TỔNG</td><td>$${TT.tg}</td><td>$${TT.dt}</td><td>${TT.tg?pctT+'%':'—'}</td></tr></table></div>
    <p style="color:var(--muted);font-size:12px;margin-top:8px">Mục tiêu đặt riêng từng tháng · % hoàn thành = DT tổng (đơn đã chốt) trong tháng / mục tiêu. Gõ số rồi bấm ra ngoài để lưu — ai cũng nhập/sửa được.</p>`;
  // ----- VIỆC CẦN LÀM (theo Sale) -----
  const openT=TASKS.filter(t=>!t.xong);
  const rws = (ME.role==='admin'||ME.role==='owner'||ME.role==='marketing')? Object.entries(SALES) : [[ME.id, ME.name]];
  html+=`<h2 class="sec" style="margin-top:24px">📋 Việc cần làm (theo Sale)</h2>
    <div class="card" style="padding:0;overflow-x:auto"><table>
    <tr><th>Sale</th><th>Quá hạn</th><th>Hôm nay</th><th>Sắp tới</th><th>Tổng việc đang mở</th></tr>`;
  let tot=0;
  rws.forEach(([id,name])=>{ const ts=openT.filter(t=>t.owner===id); tot+=ts.length;
    const o=ts.filter(t=>taskBucket(t)==='over').length, td=ts.filter(t=>taskBucket(t)==='today').length, up=ts.filter(t=>taskBucket(t)==='upcoming').length;
    html+=`<tr><td><b>${name}</b></td><td>${o?`<b style="color:var(--over)">${o}</b>`:'0'}</td><td>${td?`<b style="color:#b07d00">${td}</b>`:'0'}</td><td>${up}</td><td><b>${ts.length}</b></td></tr>`;
  });
  html+=`</table></div><p style="color:var(--muted);font-size:12px;margin-top:8px">Tổng ${tot} việc đang mở. Chi tiết từng việc xem ở trang <b>Việc cần làm</b>.</p>`;
  document.getElementById('v-report').innerHTML=html;
}

let MKT_DETAIL_DATE='';
function setMktDetailDate(v){ MKT_DETAIL_DATE=v; renderMarketing(); }
let MKT_FORM_OPEN=false;
function toggleMktForm(){ MKT_FORM_OPEN=!MKT_FORM_OPEN; renderMarketing(); }
function renderMarketing(){
  const rg=getRange('mkt');
  const ROWS=MREPORTS.filter(r=> (!rg.s||r.ngay>=rg.s) && (!rg.e||r.ngay<=rg.e));
  const pct=(a,b)=> b? (Math.round(a/b*1000)/10)+'%' : '—';
  const money=n=> (Math.round(Number(n)||0)).toLocaleString('vi-VN')+' đ';
  const canDelM=(ME&&(ME.role==='admin'||ME.role==='owner'||ME.role==='marketing'));
  let html=renderDateFilterBar('mkt');
  if(canDelM) html+=`<div style="margin:-4px 0 8px;text-align:right"><button class="btn" type="button" style="background:#c25b56;padding:6px 12px;font-size:12px" onclick="deleteAllMReports()">🗑 Xoá tất cả (đang lọc)</button></div>`;
  if(canDelM) html+=`<div style="margin:0 0 14px;display:flex;gap:6px;flex-wrap:wrap;align-items:center"><span style="font-size:12px;color:var(--muted)">🖼 Ảnh Marketing:</span>${Object.entries(MKT).map(([id,nm])=>`<button class="btn ghost" type="button" style="padding:4px 10px;font-size:12px" onclick="pickImage('mkt_${id}',300)">${nm}${IMAGES['mkt_'+id]?' ✓':''}</button>`).join('')}</div>`;

  // ----- Bảng tổng hợp theo từng MKT (check hàng ngày) -----
  const byMkt={};
  ROWS.forEach(r=>{ const k=r.owner||'—'; const m=byMkt[k]=byMkt[k]||{tien:0,mes:0,cmt:0,tt:0,chot:0};
    m.tien+=Number(r.tien)||0; m.mes+=Number(r.sl_mes)||0; m.cmt+=Number(r.so_cmt)||0; m.tt+=Number(r.mes_tt)||0; m.chot+=Number(r.sd_chot)||0; });
  let TT={tien:0,mes:0,cmt:0,tt:0,chot:0};
  html+=`<h2 class="sec">📊 Tổng hợp theo MKT (check hàng ngày)</h2><div class="card" style="padding:0;overflow-x:auto"><table>
    <tr><th>MKT</th><th>Tổng tiền</th><th>SL MES</th><th>Số CMT</th><th>CP/MES</th><th>MES TT</th><th>Tỷ lệ TT</th><th>SĐ chốt</th><th>Tỷ lệ chốt</th></tr>`;
  Object.entries(MKT).forEach(([id,name])=>{
    const m=byMkt[id]; if(!m) return;
    TT.tien+=m.tien;TT.mes+=m.mes;TT.cmt+=m.cmt;TT.tt+=m.tt;TT.chot+=m.chot;
    html+=`<tr><td><b>${name}</b></td><td>${money(m.tien)}</td><td>${m.mes}</td><td>${m.cmt}</td>
      <td>${(m.mes+m.cmt)?money(m.tien/(m.mes+m.cmt)):'—'}</td><td>${m.tt}</td><td>${pct(m.tt,m.mes)}</td>
      <td>${m.chot}</td><td>${pct(m.chot,m.mes)}</td></tr>`;
  });
  if(!Object.keys(byMkt).length) html+=`<tr><td colspan="9" class="empty">Chưa có báo cáo nào trong kỳ.</td></tr>`;
  else html+=`<tr style="background:var(--cream);font-weight:700"><td>TỔNG</td><td>${money(TT.tien)}</td><td>${TT.mes}</td><td>${TT.cmt}</td>
    <td>${(TT.mes+TT.cmt)?money(TT.tien/(TT.mes+TT.cmt)):'—'}</td><td>${TT.tt}</td><td>${pct(TT.tt,TT.mes)}</td><td>${TT.chot}</td><td>${pct(TT.chot,TT.mes)}</td></tr>`;
  html+=`</table></div>`;

  // ----- ĐỐI CHIẾU: data tay marketer nhập vs khách thực tế (sale note) -----
  {
    const odM=c=>(c.ngay_chot||c.ngay_tao||'').slice(0,10);
    const custM=DATA.filter(c=>{const x=odM(c); return (!rg.s||x>=rg.s)&&(!rg.e||x<=rg.e);});
    let cmpRows='', anyLech=false;
    Object.entries(MKT).forEach(([id,name])=>{
      const ks=custM.filter(c=>c.mkt===id); const chotReal=ks.filter(c=>isChot(c.tt)).length;
      const chotRep=(byMkt[id]&&byMkt[id].chot)||0;
      if(!ks.length && !chotRep) return;
      const ok=chotReal===chotRep; if(!ok) anyLech=true;
      cmpRows+=`<tr><td><b>${name}</b></td><td style="text-align:center">${ks.length}</td><td style="text-align:center">${chotReal}</td><td style="text-align:center">${chotRep}</td><td style="text-align:center">${ok?'<span style="color:var(--won);font-weight:700">✓ Khớp</span>':'<span style="color:var(--over);font-weight:700">⚠ Lệch '+Math.abs(chotReal-chotRep)+'</span>'}</td></tr>`;
    });
    html+=`<h2 class="sec" style="margin-top:24px">🔄 Đối chiếu MKT: số tay nhập vs khách thực tế (sale note)</h2>
      <p style="color:var(--muted);font-size:12px;margin:-6px 0 10px">Vòng tròn = khách thực tế sale đã note cho từng MKT. Bảng so sánh <b>SĐ chốt thực tế</b> (từ data khách) với <b>SĐ chốt marketer tự báo cáo</b> — lệch nhiều là cần kiểm tra lại.</p>
      <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:18px">
        <div class="card" style="flex:1;min-width:320px"><h2 class="sec" style="margin:0 0 10px">📊 Khách thực tế theo MKT</h2>${groupDonutHTML(custM,'mkt',MKT)}</div>
        <div class="card" style="flex:1;min-width:320px;padding:0;overflow-x:auto"><table>
          <tr><th>MKT</th><th style="text-align:center">Khách thực tế</th><th style="text-align:center">Chốt thực tế</th><th style="text-align:center">SĐ chốt báo cáo</th><th style="text-align:center">Khớp?</th></tr>
          ${cmpRows||'<tr><td colspan="5" class="empty">Chưa có dữ liệu trong kỳ.</td></tr>'}
        </table></div>
      </div>`;
  }

  // ----- ĐỐI CHIẾU CHI TIẾT PHỄU MKT (báo cáo vs sale note) -----
  {
    const odR=c=>(c.ngay_chot||c.ngay_tao||'').slice(0,10);
    const custR=DATA.filter(c=>{const x=odR(c); return (!rg.s||x>=rg.s)&&(!rg.e||x<=rg.e);});
    const ENG=['ktt','tuong_tac','dang_care','hen','da_chot','chot_nguoi'];
    const lechPct=(a,b)=>{const m=Math.max(a,b,1); return Math.round(Math.abs(a-b)/m*100);};
    const cellR=(rep,real)=>{
      const d=rep-real; const lp=lechPct(rep,real); const red=lp>=30; const sign=d>0?'+':'';
      return `<td style="text-align:center">${rep}</td><td style="text-align:center">${real}</td>`
        +`<td style="text-align:center;${red?'color:var(--over);font-weight:800':''}">${sign}${d}</td>`
        +`<td style="text-align:center;${red?'background:#fbeaea;color:var(--over);font-weight:800':'color:var(--muted)'}">${lp}%${red?' ⚠':''}</td>`;
    };
    let recRows='';
    Object.entries(MKT).forEach(([id,name])=>{
      const ks=custR.filter(c=>c.mkt===id);
      const b=byMkt[id]||{mes:0,tt:0,chot:0};
      const khach=ks.length, ttReal=ks.filter(c=>ENG.includes(c.tt)).length, chotReal2=ks.filter(c=>isChot(c.tt)).length;
      if(!ks.length && !((b.mes||0)||(b.tt||0)||(b.chot||0))) return;
      recRows+=`<tr style="background:#eef6f0"><td colspan="5" style="font-weight:800;color:var(--teal-dark)">${name}</td></tr>`;
      recRows+=`<tr><td>📨 Lead (MES ↔ Khách)</td>${cellR(b.mes||0,khach)}</tr>`;
      recRows+=`<tr><td>💬 Tương tác (MES TT ↔ Khách TT)</td>${cellR(b.tt||0,ttReal)}</tr>`;
      recRows+=`<tr><td>✅ Chốt (SĐ chốt ↔ Chốt thật)</td>${cellR(b.chot||0,chotReal2)}</tr>`;
    });
    html+=`<h2 class="sec" style="margin-top:24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">🔎 Đối chiếu chi tiết phễu MKT (báo cáo vs sale note)<button class="btn ghost" type="button" style="padding:4px 12px;font-size:12px;font-weight:600" onclick="var b=document.getElementById('box-pheu');var h=b.style.display==='none';b.style.display=h?'':'none';this.textContent=h?'▼ Thu gọn':'▶ Mở rộng'">▼ Thu gọn</button></h2>
      <div id="box-pheu">
      <p style="color:var(--muted);font-size:12px;margin:-6px 0 10px">So từng tầng phễu: số <b>marketer tự báo cáo</b> vs <b>khách thực tế sale note</b>. Tô đỏ khi lệch ≥ 30% — tầng nào đỏ là chỗ cần kiểm tra (lead rơi / khai vống / sale chưa cập nhật trạng thái).</p>
      <div class="card" style="padding:0;overflow-x:auto"><table>
        <tr><th>Tầng phễu</th><th style="text-align:center">Báo cáo MKT</th><th style="text-align:center">Sale note</th><th style="text-align:center">Chênh</th><th style="text-align:center">% lệch</th></tr>
        ${recRows||'<tr><td colspan="5" class="empty">Chưa có dữ liệu trong kỳ.</td></tr>'}
      </table></div>
      </div>`;
  }

  // ----- TỶ LỆ MKT TƯƠNG TÁC THEO TỆP KHÁCH -----
  {
    const odI=c=>(c.ngay_chot||c.ngay_tao||'').slice(0,10);
    const custI=DATA.filter(c=>{const x=odI(c); return (!rg.s||x>=rg.s)&&(!rg.e||x<=rg.e);});
    const SK=['kcnc','ktt','tuong_tac','web','khach_chan','da_chot','chot_nguoi','dang_care','hen'];
    const ENGAGED=['ktt','tuong_tac','dang_care','hen','da_chot','chot_nguoi'];
    const blank=()=>{const o={tong:0,eng:0}; SK.forEach(k=>o[k]=0); return o;};
    const stat={}; let GT=blank();
    custI.forEach(c=>{
      const id=c.mkt||'—'; const s=stat[id]=stat[id]||blank(); const tt=c.tt||'kcnc';
      if(s[tt]!==undefined) s[tt]++; if(GT[tt]!==undefined) GT[tt]++;
      s.tong++; GT.tong++;
      if(ENGAGED.includes(tt)){ s.eng++; GT.eng++; }
    });
    const cell=v=>`<td style="text-align:center">${v||'—'}</td>`;
    const rateCell=(eng,tong)=>{const n=tong?Math.round(eng/tong*100):0; return `<td style="text-align:center;min-width:92px"><div style="font-weight:800;color:var(--teal-dark)">${pct(eng,tong)}</div><div style="height:6px;background:#e6ece8;border-radius:4px;overflow:hidden;margin-top:3px"><div style="height:100%;width:${n}%;background:var(--teal)"></div></div></td>`;};
    let rows='';
    Object.entries(MKT).forEach(([id,name])=>{
      const s=stat[id]; if(!s||!s.tong) return;
      rows+=`<tr><td><b>${name}</b></td>${SK.map(k=>cell(s[k])).join('')}<td style="text-align:center;font-weight:700">${s.tong}</td>${rateCell(s.eng,s.tong)}</tr>`;
    });
    const header=`<tr><th>MKT</th>${SK.map(k=>`<th style="text-align:center">${STATUS[k]}</th>`).join('')}<th style="text-align:center">TỔNG</th><th style="text-align:center">% TƯƠNG TÁC</th></tr>`;
    const totRow=GT.tong?`<tr style="background:var(--cream);font-weight:700"><td>TỔNG</td>${SK.map(k=>`<td style="text-align:center">${GT[k]||'—'}</td>`).join('')}<td style="text-align:center">${GT.tong}</td>${rateCell(GT.eng,GT.tong)}</tr>`:'';
    html+=`<h2 class="sec" style="margin-top:24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">📈 Tỷ lệ Marketing tương tác theo tệp khách<button class="btn ghost" type="button" style="padding:4px 12px;font-size:12px;font-weight:600" onclick="var b=document.getElementById('box-ttmkt');var h=b.style.display==='none';b.style.display=h?'':'none';this.textContent=h?'▼ Thu gọn':'▶ Mở rộng'">▼ Thu gọn</button></h2>
      <div id="box-ttmkt">
      <p style="color:var(--muted);font-size:12px;margin:-6px 0 10px">Mỗi MKT: tệp khách thực tế (sale note) chia theo trạng thái. <b>% Tương tác</b> = khách đã có phản hồi (KTT + Tương tác + Đang care + Hẹn + Chốt) ÷ tổng khách — cao là tệp chất lượng, thấp là cần xem lại nguồn/nội dung.</p>
      <div class="card" style="padding:0;overflow-x:auto"><table>
        ${header}
        ${rows||'<tr><td colspan="'+(SK.length+3)+'" class="empty">Chưa có dữ liệu trong kỳ.</td></tr>'}
        ${totRow}
      </table></div>
      </div>`;
  }

  // ----- Form nhập báo cáo (2 bạn MKT) — gập lại được -----
  html+=`<div style="display:flex;align-items:center;gap:10px;margin-top:18px"><h2 class="sec" style="margin:0">➕ Nhập báo cáo Marketing</h2><button class="btn ghost" type="button" style="padding:5px 12px;font-size:12px" onclick="toggleMktForm()">${MKT_FORM_OPEN?'✕ Thu gọn':'Mở form nhập'}</button><span style="font-size:12px;color:var(--muted)">(hoặc nhập trực tiếp trên bảng dưới)</span></div>`;
  if(MKT_FORM_OPEN) html+=`<div class="card" style="margin-top:10px"><form onsubmit="saveMReport(event)">
    <div class="form-grid">
      <div><label>📅 Ngày báo cáo <span style="font-weight:400;color:var(--muted)">(kết quả của ngày nào — VD báo cáo ngày 25 cho KQ ngày 24 thì chọn 24)</span></label><input id="m-ngay" type="date" value="${D(0)}"></div>
      <div><label>MKT phụ trách</label><select id="m-owner">${Object.entries(MKT).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}</select></div>
      <div><label>Tên Page</label><input id="m-page" placeholder="VD: AGO Women US"></div>
      <div><label>Camp</label><input id="m-camp" placeholder="Tên/ID campaign"></div>
      <div><label>Số tiền / Camp (VND đ)</label><input id="m-tien" type="number" step="1" value="0"></div>
      <div><label>SL MES (tin nhắn)</label><input id="m-mes" type="number" value="0"></div>
      <div><label>Số CMT</label><input id="m-cmt" type="number" value="0"></div>
      <div><label>MES TT (tương tác)</label><input id="m-tt" type="number" value="0"></div>
      <div><label>SĐ chốt</label><input id="m-chot" type="number" value="0"></div>
      <div class="full"><button class="btn" type="submit">💾 Lưu báo cáo</button></div>
    </div></form>
    <p style="color:var(--muted);font-size:12px;margin-top:8px">CP/MES = Tiền ÷ (SL MES + CMT) · Tỷ lệ TT = MES TT ÷ SL MES · Tỷ lệ chốt = SĐ chốt ÷ SL MES.</p></div>`;

  // ----- Bảng chi tiết: gom theo MKT → theo NGÀY → Page -----
  html+=`<h2 class="sec" style="margin-top:18px">📄 Chi tiết theo Page / Camp</h2>`;
  const allDates=[...new Set(ROWS.map(r=>(r.ngay||'').slice(0,10)).filter(Boolean))].sort().reverse();
  html+=`<div style="margin-bottom:12px;display:flex;flex-wrap:wrap;gap:6px;align-items:center">
    <span style="font-size:12px;color:var(--muted);font-weight:600">🗓 Chọn ngày:</span>
    <button class="btn ghost" type="button" style="padding:6px 12px;font-size:12px;${!MKT_DETAIL_DATE?'background:var(--teal);color:#fff;':''}" onclick="setMktDetailDate('')">Tất cả ngày (${allDates.length})</button>
    ${allDates.map(d=>`<button class="btn ghost" type="button" style="padding:6px 12px;font-size:12px;${MKT_DETAIL_DATE===d?'background:var(--teal);color:#fff;':''}" onclick="setMktDetailDate('${d}')">${d}</button>`).join('')}
  </div>`;
  const ownerKeys=Object.keys(MKT).filter(id=>ROWS.some(r=>r.owner===id));
  const otherOwners=[...new Set(ROWS.filter(r=>!MKT[r.owner]).map(r=>r.owner))];
  const allOwners=[...ownerKeys,...otherOwners];
  if(!ROWS.length) html+=`<div class="card empty">Chưa có báo cáo nào trong kỳ.</div>`;
  const sumOf=arr=>{ const s={tien:0,mes:0,cmt:0,tt:0,chot:0}; arr.forEach(r=>{s.tien+=+r.tien||0;s.mes+=+r.sl_mes||0;s.cmt+=+r.so_cmt||0;s.tt+=+r.mes_tt||0;s.chot+=+r.sd_chot||0;}); return s; };
  allOwners.forEach(oid=>{
    let orows=ROWS.filter(r=>r.owner===oid);
    if(MKT_DETAIL_DATE) orows=orows.filter(r=>(r.ngay||'').slice(0,10)===MKT_DETAIL_DATE);

let IMAGES={};
function pickImage(key,maxW){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
  inp.onchange=()=>{ const f=inp.files&&inp.files[0]; if(!f) return;
    const r=new FileReader(); r.onload=()=>{ const img=new Image(); img.onload=async()=>{
      const sc=Math.min(1,maxW/img.width); const w=Math.round(img.width*sc), h=Math.round(img.height*sc);
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h; cv.getContext('2d').drawImage(img,0,0,w,h);
      const data=cv.toDataURL('image/jpeg',0.82); IMAGES[key]=data;
      if(window.sb){ const { error }=await sb.from('app_images').upsert({key,data,updated_at:new Date().toISOString()}); if(error){ alert('Lỗi lưu ảnh: '+error.message+'\\n(Có thể chưa tạo bảng app_images trên Supabase)'); return; } }
      (key.indexOf('mkt_')===0?renderMarketing:renderTeam)(); alert('✅ Đã cập nhật ảnh.');
    }; img.src=r.result; }; r.readAsDataURL(f); };
  inp.click();
}

function delAccount(u){
  if(u==='owner'||u===ME.uname){ alert('Không thể xóa tài khoản này.'); return; }

async function loadDbUsage(){
  const el=document.getElementById('db-usage'); if(!el) return;
  if(!window.sb){ el.innerHTML='<span style="color:var(--muted)">Chưa kết nối hệ thống.</span>'; return; }
  try{
    const { data, error }=await sb.rpc('db_usage');
    if(error||!data){ el.innerHTML='<span style="color:var(--muted)">Không đọc được dung lượng. Hãy tạo hàm db_usage trên Supabase.</span>'; return; }
    const d=(typeof data==='string')?JSON.parse(data):data;
    const pct=Number(d.pct)||0, mb=Number(d.mb)||0, khach=Number(d.khach)||0;
    const col=pct>=90?'var(--over)':pct>=70?'#b07d00':'var(--won)';
    el.innerHTML=`<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span><b>${mb} MB</b> / 500 MB · <b>${khach}</b> khách</span><span style="color:${col};font-weight:700">${pct}%</span></div>
      <div class="bar" style="height:14px"><div style="width:${Math.min(pct,100)}%;background:${col}"></div></div>
      <p style="color:var(--muted);font-size:12px;margin-top:8px">${pct>=90?'⚠ Sắp đầy — nên nâng cấp gói Pro (8GB).':pct>=70?'Đang dùng khá nhiều, theo dõi thêm nhé.':'Còn rất nhiều dung lượng. 👍'}</p>`;
  }catch(e){ el.innerHTML='<span style="color:var(--muted)">Lỗi đọc dung lượng.</span>'; }
}
async function changeMyPass(){
  if(!sb){ alert('Chưa kết nối hệ thống.'); return; }
  const p1=(document.getElementById('cpw1').value||''), p2=(document.getElementById('cpw2').value||'');
  if(p1.length<6){ alert('Mật khẩu tối thiểu 6 ký tự.'); return; }
  if(p1!==p2){ alert('Hai ô mật khẩu chưa khớp.'); return; }
  const { error }=await sb.auth.updateUser({ password:p1 });
  if(error){ alert('Lỗi đổi mật khẩu: '+error.message); return; }
  document.getElementById('cpw1').value=''; document.getElementById('cpw2').value='';
  alert('✅ Đã đổi mật khẩu. Lần sau đăng nhập bằng mật khẩu mới.');
}

/* ---- Bảo mật 2 lớp (2FA / TOTP) ---- */
async function ensureMFA(){
  try{
    const { data: aal, error } = await sb.auth.mfa.getAuthenticatorAssuranceLevel();
    if(error || !aal) return true;
    if(aal.nextLevel==='aal2' && aal.currentLevel!=='aal2'){
      const { data: factors } = await sb.auth.mfa.listFactors();
      const totp = (factors && factors.totp ? factors.totp : []).find(f=>f.status==='verified');
      if(!totp) return true; // chưa bật 2FA -> bỏ qua
      const { data: ch, error: ce } = await sb.auth.mfa.challenge({ factorId: totp.id });
      if(ce){ alert('Lỗi 2FA: '+ce.message); return false; }
      const code = prompt('🔐 Nhập mã 6 số từ app Authenticator để vào hệ thống:');
      if(!code){ return false; }
      const { error: ve } = await sb.auth.mfa.verify({ factorId: totp.id, challengeId: ch.id, code: (''+code).trim() });
      if(ve){ alert('Mã 2FA sai hoặc đã hết hạn. Vui lòng đăng nhập lại.'); return false; }
    }
    return true;
  }catch(e){ return true; }
}
async function enrollMFA(){
  const { data: f } = await sb.auth.mfa.listFactors();
  if(f && f.totp && f.totp.some(x=>x.status==='verified')){ alert('Tài khoản này đã bật 2FA rồi.'); return; }
  const { data, error } = await sb.auth.mfa.enroll({ factorType:'totp', friendlyName:'CCP-'+Date.now() });
  if(error){ alert('Lỗi bật 2FA: '+error.message); return; }
  const fid=data.id, qr=data.totp.qr_code, secret=data.totp.secret;
  let ov=document.getElementById('mfa-overlay');
  if(!ov){ ov=document.createElement('div'); ov.id='mfa-overlay';
    ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px'; document.body.appendChild(ov); }
  ov.style.display='flex';
  ov.innerHTML=`<div class="card" style="max-width:420px;width:100%;text-align:center">
    <h2 class="sec" style="margin-top:0">🔐 Bật bảo mật 2 lớp</h2>
    <p style="font-size:13px;color:var(--muted);text-align:left;line-height:1.7">1) Mở app <b>Google Authenticator</b> hoặc <b>Authy</b> trên điện thoại.<br>2) Bấm "+" → quét mã QR dưới đây.<br>3) Nhập 6 số app hiển thị để xác nhận.</p>
    <div style="background:#fff;padding:10px;border-radius:10px;display:inline-block">${qr}</div>
    <p style="font-size:11px;color:var(--muted);word-break:break-all">Mã thủ công (nếu không quét được): ${secret}</p>
    <input id="mfa-code" placeholder="Nhập 6 số" style="text-align:center;letter-spacing:4px;font-size:18px">
    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="btn" style="flex:1" type="button" onclick="verifyMFA('${fid}')">Xác nhận bật</button>
      <button class="btn ghost" type="button" onclick="document.getElementById('mfa-overlay').style.display='none'">Huỷ</button>
    </div></div>`;
}
async function verifyMFA(fid){
  const code=(document.getElementById('mfa-code').value||'').trim();
  if(!code){ alert('Nhập mã 6 số trước.'); return; }
  const { error } = await sb.auth.mfa.challengeAndVerify({ factorId: fid, code });
  if(error){ alert('Mã sai hoặc hết hạn, thử lại: '+error.message); return; }
  document.getElementById('mfa-overlay').style.display='none';
  alert('✅ Đã bật 2FA. Từ lần đăng nhập sau, hệ thống sẽ hỏi mã 6 số từ app Authenticator.');
}
async function disableMFA(){
  const { data: f } = await sb.auth.mfa.listFactors();
  const list=(f && f.totp)?f.totp:[];
  if(!list.length){ alert('Tài khoản chưa bật 2FA.'); return; }
  if(!confirm('Tắt bảo mật 2 lớp cho tài khoản này?')) return;
  for(const x of list){ await sb.auth.mfa.unenroll({ factorId: x.id }); }
  alert('Đã tắt 2FA.');
}

async function saveCustomer(e){
  e.preventDefault(); const g=id=>document.getElementById(id).value;
  const owner = ME.role==='sale'?ME.id:(g('f-owner')||ME.id);
  const rec={owner, mkt:g('f-mkt')||null, ten:g('f-ten'), phone:g('f-phone'), has_wa:document.getElementById('f-wa').checked,
    email:g('f-email'), quoc_gia:g('f-qg'), dia_chi:g('f-diachi')||null, nguon:g('f-nguon'), benh:'khac', benh_list:(g('f-benh')||'').trim(),
    sp:(g('f-sp')||'').trim()||'—', muc:g('f-muc'), tt:g('f-tt'), follow:g('f-follow')||null, ghi:g('f-ghi'),
    dt:Number(g('f-dt'))||0, ngay_chot:g('f-ngaychot')||D(0), ly:g('f-ly'), khach_cu:false, ngay_tao:D(0), ngay_capnhat:D(0)};
  if(isChot(rec.tt)) rec.loai_don='moi';
  // ===== ĐỒNG BỘ KHÁCH TRÙNG: cùng SĐT/email -> cộng lần mua vào khách cũ thay vì tạo bản ghi trùng =====
  const _dig=s=>(''+(s||'')).replace(/\D/g,'');
  const _ph=_dig(rec.phone), _em=(''+(rec.email||'')).trim().toLowerCase();
  const dup = (_ph.length>=8||_em) ? DATA.find(c=>!c.da_xoa && ((_ph.length>=8 && _dig(c.phone)===_ph) || (_em && (''+(c.email||'')).trim().toLowerCase()===_em))) : null;
  if(dup){
    const nLan=soLanMua(dup);
    const ok=confirm(`⚠️ Khách "${dup.ten}" đã có trong hệ thống (đã mua ${nLan} lần · trạng thái: ${STATUS[dup.tt]||dup.tt} · Sale: ${SALES[dup.owner]||'—'}).\n\n• OK = THÊM LẦN MUA MỚI vào khách này (đồng bộ số lần mua)\n• Cancel = Vẫn tạo khách MỚI riêng`);
    if(ok){
      if(rec.dt>0){
        const {error:eo}=await sb.from('orders').insert({customer_id:dup.id, lan:nLan+1, ngay:rec.ngay_chot, san_pham:rec.sp, so_tien:rec.dt});
        if(eo){ alert('Lỗi thêm lần mua: '+eo.message); return; }
      }
      const upd={khach_cu:true, ngay_capnhat:D(0)};
      if(isChot(rec.tt) && !isChot(dup.tt)) upd.tt=rec.tt;
      if(rec.follow) upd.follow=rec.follow;
      if((''+(rec.ghi||'')).trim()) upd.ghi=((dup.ghi?dup.ghi+'\n':'')+rec.ghi);
      await sb.from('customers').update(upd).eq('id',dup.id);
      e.target.reset(); await loadAll(); renderAll(); go('list');
      alert(`✅ Đã đồng bộ vào khách "${dup.ten}" — giờ có ${rec.dt>0?nLan+1:nLan} lần mua. Không tạo bản ghi trùng.`);
      return;
    }
  }
  const { data:ins, error } = await sb.from('customers').insert(rec).select('id').single();
  if(error){ alert('Lưu lỗi: '+error.message); return; }
  /* Tự tạo việc chăm sóc cho Sale phụ trách khách mới để tối ưu thời gian */
  if(ins && ins.id){
    await sb.from('tasks').insert({ owner:rec.owner, customer_id:ins.id, loai:'cham_chua',
      noi_dung:'Chăm sóc khách mới: '+rec.ten, han:D(0), xong:false });
  }
  e.target.reset(); await loadAll(); renderAll(); go('add');
  alert('✅ Đã lưu khách "'+rec.ten+'". Khách đã hiện ở danh sách bên dưới — có thể thêm khách tiếp ngay.');
}

        email:get('Email'), quoc_gia:get('Quốc gia','Thị trường','Country'), nguon:revFind(NGUON,get('Nguồn','Nguồn khách'))||'khac',
        benh:benhKeys[0]||'khac', benh_list:benhKeys.map(k=>BENH[k]).join(', ')||benhT, sp:get('Sản phẩm','Sản phẩm quan tâm')||'—',
        muc, tt, follow:normDate(get('Ngày follow','Ngày cần follow tiếp theo'))||null, ghi:get('Ghi chú','Ghi chú tư vấn'),
        dt:Number(get('Doanh thu','Doanh thu (USD)'))||0, ly:'', khach_cu:false, ngay_tao:D(0), ngay_capnhat:D(0) };
      if(isChot(rec.tt))rec.loai_don='moi'; recs.push(rec);
    });
    if(!recs.length){ alert('Không tìm thấy dòng hợp lệ trong file.'); return; }
    // ===== CẢNH BÁO TRÙNG: phát hiện khách trùng SĐT/email (so với khách đã có & trong file) =====
    const dig=s=>(''+(s||'')).replace(/\D/g,'');
    const existPh=new Set(DATA.filter(c=>!c.da_xoa).map(c=>dig(c.phone)).filter(p=>p.length>=8));
    const existEm=new Set(DATA.filter(c=>!c.da_xoa&&c.email).map(c=>(''+c.email).trim().toLowerCase()));
    const seenPh=new Set(), seenEm=new Set(); const ok=[], dup=[];
    recs.forEach(rc=>{ const ph=dig(rc.phone), em=(''+(rc.email||'')).trim().toLowerCase();
      const isDup=(ph.length>=8&&(existPh.has(ph)||seenPh.has(ph))) || (em&&(existEm.has(em)||seenEm.has(em)));
      if(isDup){ dup.push(rc); } else { ok.push(rc); if(ph.length>=8)seenPh.add(ph); if(em)seenEm.add(em); } });
    if(dup.length){
      const names=dup.slice(0,15).map(d=>'• '+d.ten+(d.phone?' ('+d.phone+')':'')).join('\n');
      const go2=confirm('⚠️ Có '+dup.length+' khách TRÙNG SĐT/email (với khách đã có hoặc trùng trong file):\n'+names+(dup.length>15?'\n…':'')+'\n\nOK = chỉ nhập '+ok.length+' khách KHÔNG trùng (bỏ qua trùng để sale tự kiểm tra/sửa)\nCancel = HỦY nhập toàn bộ');
      if(!go2){ return; }
    }
    if(!ok.length){ alert('Tất cả dòng đều trùng — không có khách mới để nhập. Sale kiểm tra lại file.'); return; }
    const { error }=await sb.from('customers').insert(ok);
    if(error){ alert('Nhập lỗi: '+error.message); return; }
    alert('✅ Đã nhập '+ok.length+' khách.'+(dup.length?(' ⚠️ Bỏ qua '+dup.length+' khách TRÙNG — sale kiểm tra/sửa lại.'):'')); document.getElementById('xls-file').value=''; await loadAll(); renderAll(); go('list');
  }catch(err){ alert('Lỗi đọc file: '+err.message); } };
  rd.readAsArrayBuffer(f);
}
/* ---- Phân quyền / khóa tài khoản (cập nhật profiles) ---- */
async function togglePerm(u,m){ const p=(PERMS[u]||[]).slice(); const i=p.indexOf(m); if(i>=0)p.splice(i,1); else p.push(m);
  const { error }=await sb.from('profiles').update({quyen:p}).eq('id',u); if(error){ alert(error.message); return; }
  PERMS[u]=p; if(ME&&ME.uname===u){ ME.quyen=p; applyMenu(); } renderPerms();
}
async function lockAccount(u){ if(u===ME.uname){ alert('Không thể khóa tài khoản đang đăng nhập.'); return; }
  const na = USERS[u].active===false ? true : false;
  const { error }=await sb.from('profiles').update({active:na}).eq('id',u); if(error){ alert(error.message); return; }
  await loadAll(); renderPerms();
}
async function renameAccount(u){
  const cur = USERS[u]? USERS[u].name : '';
  const nv = prompt('Đổi tên nhân sự:', cur); if(nv===null) return;
  const ten = nv.trim(); if(!ten){ alert('Tên không được để trống.'); return; }
  const { error }=await sb.from('profiles').update({ten}).eq('id',u);
  if(error){ alert('Lỗi đổi tên: '+error.message); return; }
  await loadAll(); renderAll();
}
async function createAccount(e){ e.preventDefault();
  const g=id=>document.getElementById(id).value.trim();
  const ten=g('na-name'), email=g('na-user'), pass=g('na-pass')||'123', role=g('na-role');
  if(!ten||!email){ alert('Nhập tên và email đăng nhập.'); return; }
  const btn=e.target.querySelector('button[type=submit]'); if(btn){btn.disabled=true;btn.textContent='Đang tạo...';}
  const { data, error } = await sb.functions.invoke('admin-create-user', { body:{ ten, email, password:pass, role } });
  if(btn){btn.disabled=false;btn.textContent='Tạo tài khoản';}
  if(error){ alert('Tạo lỗi: '+(error.message||error)); return; }
  if(data && data.error){ alert('Tạo lỗi: '+data.error); return; }
  alert('✅ Đã tạo tài khoản "'+ten+'"\nEmail: '+email+'\nMật khẩu: '+pass+'\nVai trò: '+role);
  e.target.reset(); await loadAll(); renderAll();
}
async function delAccount(u){
  if(u===ME.uname){ alert('Không thể xoá tài khoản đang đăng nhập.'); return; }
  const a=USERS[u]; const nm=a?a.name:u;
  if(!confirm('Xoá VĨNH VIỄN tài khoản "'+nm+'"?\nTài khoản sẽ không đăng nhập được nữa. Khách của họ được chuyển về Admin. Không khôi phục được.')) return;
  const { data, error } = await sb.functions.invoke('admin-delete-user', { body:{ id:u } });
  if(error){ alert('Xoá lỗi: '+(error.message||error)); return; }
  if(data && data.error){ alert('Xoá lỗi: '+data.error); return; }
  alert('Đã xoá tài khoản "'+nm+'".'); await loadAll(); renderAll();
}
async function adminResetPass(u){
  const a=USERS[u]; const nm=a?a.name:u;
  const pass=prompt('Đặt mật khẩu MỚI cho "'+nm+'" (tối thiểu 6 ký tự):','123456');
  if(pass===null) return;
  if((pass||'').length<6){ alert('Mật khẩu tối thiểu 6 ký tự.'); return; }
  const { data, error } = await sb.functions.invoke('admin-reset-password', { body:{ id:u, password:pass } });
  if(error){ alert('Lỗi đặt lại mật khẩu: '+(error.message||error)); return; }
  if(data && data.error){ alert('Lỗi: '+data.error); return; }
  alert('✅ Đã đặt lại mật khẩu cho "'+nm+'".\nMật khẩu mới: '+pass+'\nHãy báo nhân viên đăng nhập rồi đổi lại ở mục Cài đặt.');
}

/* ---- Khởi động: đổi ô đăng nhập sang Email + tự đăng nhập nếu còn phiên ---- */
window.addEventListener('DOMContentLoaded', ()=>{
  const u=document.getElementById('u'); if(u) u.placeholder='Email';
  if(sb){ sb.auth.getSession().then(async ({data})=>{ if(data.session){
    if(!sessionStorage.getItem('ccp_active')){ await sb.auth.signOut(); return; } /* tab/trình duyệt mới -> bắt đăng nhập lại */
    if(await ensureMFA()){ afterLogin(); } else { await sb.auth.signOut(); }
  } }); }
});
