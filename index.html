<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCP CRM — Demo</title>
<style>
  :root{
    --teal:#3f7d72; --teal-dark:#2f5d55; --sage:#8fb3a6; --cream:#f6f2e9;
    --bg:#f3f5f4; --card:#ffffff; --line:#e3e8e6; --text:#22302c; --muted:#6b7c76;
    --hot:#e8553a; --warn:#f4b740; --over:#e23d3d; --won:#2f9e6e;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,Arial,sans-serif}
  body{background:var(--bg);color:var(--text);font-size:14px}
  /* ---------- LOGIN ---------- */
  #login{position:fixed;inset:0;background:linear-gradient(135deg,var(--teal),var(--teal-dark));
    display:flex;align-items:center;justify-content:center}
  .login-card{background:#fff;border-radius:18px;padding:40px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.25);text-align:center}
  .logo{font-size:26px;font-weight:800;color:var(--teal);letter-spacing:1px}
  .logo small{display:block;font-size:12px;color:var(--muted);font-weight:500;margin-top:4px}
  .login-card input{width:100%;padding:11px 13px;margin-top:12px;border:1px solid var(--line);border-radius:10px;font-size:14px}
  .login-card button{width:100%;margin-top:16px;padding:12px;border:0;border-radius:10px;background:var(--teal);color:#fff;font-weight:600;cursor:pointer}
  .hint{margin-top:18px;font-size:12px;color:var(--muted);text-align:left;background:var(--cream);padding:10px 12px;border-radius:10px;line-height:1.6}
  /* ---------- APP LAYOUT ---------- */
  #app{display:none;min-height:100vh}
  .sidebar{position:fixed;left:0;top:0;bottom:0;width:230px;background:var(--teal-dark);color:#dce9e5;padding:20px 0;display:flex;flex-direction:column}
  .sidebar .logo{color:#fff;padding:0 22px 16px;text-align:left}
  .nav a{display:flex;align-items:center;gap:11px;padding:12px 22px;color:#cfe0db;text-decoration:none;font-weight:500;cursor:pointer;border-left:3px solid transparent}
  .nav a:hover{background:rgba(255,255,255,.06)}
  .nav a.active{background:rgba(255,255,255,.12);border-left-color:var(--sage);color:#fff}
  .nav .ic{width:18px;text-align:center}
  .sidebar .foot{margin-top:auto;padding:14px 22px;border-top:1px solid rgba(255,255,255,.12);font-size:12px}
  .sidebar .foot b{color:#fff}
  .logout{margin-top:8px;color:#ffd9d0;cursor:pointer;font-size:12px}
  .main{margin-left:230px;padding:26px 30px}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
  .topbar h1{font-size:21px}
  .badge{background:var(--cream);color:var(--teal-dark);padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600}
  /* alert banner */
  #alertbar{background:#fff4e0;border:1px solid var(--warn);color:#8a6400;padding:11px 16px;border-radius:10px;margin-bottom:18px;font-size:13px;display:none}
  /* ---------- CARDS / KPI ---------- */
  .grid{display:grid;gap:16px}
  .kpi-grid{grid-template-columns:repeat(4,1fr)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px}
  .kpi .lbl{font-size:12px;color:var(--muted);margin-bottom:6px}
  .kpi .val{font-size:26px;font-weight:800;color:var(--teal-dark)}
  .kpi .val.red{color:var(--over)} .kpi .val.green{color:var(--won)} .kpi .val.amber{color:#cf9300}
  h2.sec{font-size:15px;margin:24px 0 12px}
  /* ---------- TABLE ---------- */
  table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden}
  th,td{padding:10px 12px;text-align:left;font-size:13px;border-bottom:1px solid var(--line)}
  th{background:var(--cream);color:var(--teal-dark);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.4px}
  tr:last-child td{border-bottom:0}
  .pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
  .row-hot{box-shadow:inset 4px 0 0 var(--hot)}
  .row-warn{background:#fffbf0} .row-over{background:#fdeeee} .row-won{background:#eefaf3}
  .tag-nong{background:#fde3dd;color:var(--hot)} .tag-am{background:#fdf0d8;color:#b07d00} .tag-lanh{background:#e4eef5;color:#3b6e92}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
  /* ---------- FILTERS / FORM ---------- */
  .filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;align-items:center}
  .filters select,.filters input{padding:8px 10px;border:1px solid var(--line);border-radius:9px;font-size:13px;background:#fff;width:auto;max-width:190px}
  .filters input.search{flex:1 1 240px;min-width:200px;max-width:none}
  .colbar{display:flex;flex-wrap:wrap;gap:6px 14px;align-items:center;margin-bottom:10px;font-size:12.5px}
  .colbar label{display:inline-flex;align-items:center;gap:5px;font-weight:500;color:var(--text);margin:0;cursor:pointer}
  .colbar input{width:auto;margin:0}
  .rev-grid{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px}
  .rev-card{flex:1 1 130px;min-width:120px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 14px}
  .rev-card .rl{font-size:12px;color:var(--muted)} .rev-card .rv{font-size:18px;font-weight:800;color:var(--teal-dark)} .rev-card .rn{font-size:11px;color:var(--muted)}
  form .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px}
  input,select,textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-size:13px;font-family:inherit}
  .full{grid-column:1/3}
  .btn{padding:12px 26px;border:0;border-radius:10px;background:var(--teal);color:#fff;font-weight:700;cursor:pointer;font-size:15px}
  .btn.ghost{background:#fff;border:1px solid var(--line);color:var(--text)}
  .view{display:none} .view.active{display:block}
  .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-bottom:12px}
  .legend span{display:flex;align-items:center;gap:6px}
  .sw{width:14px;height:14px;border-radius:4px;display:inline-block}
  .bar{height:9px;background:var(--cream);border-radius:6px;overflow:hidden}
  .bar>div{height:100%;background:var(--teal)}
  .empty{color:var(--muted);text-align:center;padding:24px}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login">
  <div class="login-card">
    <div class="logo">CCP CRM<small>Hệ thống chăm sóc khách hàng chủ động</small></div>
    <input id="u" placeholder="Tài khoản" autocomplete="off">
    <input id="p" type="password" placeholder="Mật khẩu">
    <button onclick="login()">Đăng nhập</button>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app">
  <div class="sidebar">
    <div class="logo">CCP CRM</div>
    <nav class="nav" id="nav">
      <a data-v="today" class="active">Việc cần làm</a>
      <a data-v="care">Chăm sóc khách</a>
      <a data-v="list_chot">Khách đã chốt</a>
      <a data-v="list_chua">Khách chưa chốt</a>
      <a data-v="add">Thêm khách</a>
      <a data-v="dashboard">Tổng quan</a>
      <a data-v="report">Báo cáo</a>
      <a data-v="marketing">Marketing</a>
      <a data-v="team">Sale team</a>
      <a data-v="perms">Tài khoản</a>
      <a data-v="settings">Cài đặt</a>
      <a data-v="trash">Thùng rác</a>
    </nav>
    <div class="foot">
      Đăng nhập: <b id="who"></b><br><span id="role"></span>
      <div class="logout" onclick="logout()">↩ Đăng xuất</div>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <h1 id="title">Dashboard</h1>
      <span class="badge" id="todaytag"></span>
    </div>
    <div id="alertbar"></div>

    <!-- DASHBOARD -->
    <div class="view active" id="v-dashboard"></div>
    <!-- CARE CENTER -->
    <div class="view" id="v-care"></div>
    <!-- ADD -->
    <div class="view" id="v-add"></div>
    <!-- LIST -->
    <div class="view" id="v-list"></div>
    <!-- TODAY -->
    <div class="view" id="v-today"></div>
    <!-- REPORT -->
    <div class="view" id="v-report"></div>
    <!-- MARKETING -->
    <div class="view" id="v-marketing"></div>
    <!-- TEAM -->
    <div class="view" id="v-team"></div>
    <!-- SETTINGS -->
    <div class="view" id="v-settings"></div>
    <!-- PERMS -->
    <div class="view" id="v-perms"></div>
    <!-- TRASH -->
    <div class="view" id="v-trash"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============ DỮ LIỆU MẪU ============ */
const USERS = {
  owner:{pass:'123', name:'Chủ tài khoản', role:'owner', id:'OWN'},
  admin:{pass:'123', name:'Quản lý (Admin)', role:'admin', id:'A'},
  bao:  {pass:'123', name:'Bảo',    role:'sale', id:'bao'},
  phuc: {pass:'123', name:'Phúc',   role:'sale', id:'phuc'},
  tien: {pass:'123', name:'Tiên',   role:'sale', id:'tien'},
  ttien:{pass:'123', name:'T.Tiên', role:'sale', id:'ttien'},
  hoe:  {pass:'123', name:'Hòe',    role:'sale', id:'hoe'},
  yen:  {pass:'123', name:'Yến',    role:'sale', id:'yen'},
  nguyet:{pass:'123', name:'Nguyệt', role:'marketing', id:'nguyet'},
  duy:  {pass:'123', name:'Duy',    role:'marketing', id:'duy'},
  viet: {pass:'123', name:'Việt',   role:'marketing', id:'viet'},
};
const SALES = {bao:'Bảo', phuc:'Phúc', tien:'Tiên', ttien:'T.Tiên', hoe:'Hòe', yen:'Yến'};
/* Danh mục sản phẩm chuẩn AGO — đồng bộ tên để dễ phân tích sau này (nguồn: agofertility.com) */
const AGO_SP = ['AGO Mom','AGO Eva','AGO Dad','AGO Tumor','AGO Women','AGO Mama','AGO Beauty','AGO Men','AGO Hau Bien','Eva Herblux','Xmen Herblux','U Xo Herblux','Tien Liet Tuyen Herblux','Ich Than Herblux','De Khang Herblux','Ovagen','A12 Mom','Tue Tinh Nang','Bach Trinh Nu','Chill Polytic','Dieu Kinh ND AMH','Mau Nguyet Da','Mau Nguyet Da +','Tieu Nang Da','VSHM Tue Tinh','Manh Luc Da','Manh Luc Da +','Omega','Xong Phu Huong Da','Xit Phu Huong Da'];
function spDatalist(){ return '<datalist id="ago-sp-list">'+AGO_SP.map(s=>`<option value="${s}">`).join('')+'</datalist>'; }
function spChips(inputId){ return '<div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:6px">'+AGO_SP.map(s=>`<button type="button" onclick="addSP('${inputId}','${s.replace(/'/g,"\\'")}')" style="font-size:11px;padding:3px 9px;border:1px solid var(--line);border-radius:20px;background:#fff;cursor:pointer">${s}</button>`).join('')+'</div>'; }
function addSP(inputId,name){ const el=document.getElementById(inputId); if(!el) return; const v=el.value.trim(); el.value = v ? (v.replace(/\s*\+?\s*$/,'')+' + 1 '+name) : ('1 '+name); el.focus(); }
function addSpPick(){ const p=document.getElementById('f-sppick'); const q=document.getElementById('f-spqty'); const el=document.getElementById('f-sp'); if(!p||!el)return; const name=p.value; const qty=q&&q.value?q.value:1; const v=el.value.trim(); el.value = v ? (v.replace(/\s*\+?\s*$/,'')+' + '+qty+' '+name) : (qty+' '+name); }
// Tất cả các mục có thể phân quyền
const ALL_MODULES = [
  ['dashboard','Dashboard'],['care','Trung tâm chăm sóc'],['add','Thêm khách'],
  ['list','Danh sách khách'],['today','Việc cần làm'],['report','Báo cáo'],
  ['marketing','BC Marketing'],['team','Sale team'],['settings','Cài đặt'],['perms','Phân quyền'],['trash','Thùng rác'],
];
// Quyền mặc định theo VAI TRÒ (dùng khi tạo tài khoản mới)
const DEFAULT_PERMS = {
  admin:['dashboard','care','add','list','today','report','marketing','team','settings','perms','trash'],
  sale: ['dashboard','care','add','list','today'],
  marketing:['dashboard','care','list','marketing'],
};
// Quyền hiện tại của từng tài khoản — Admin/Chủ chỉnh trên trang Tài khoản & Phân quyền
let PERMS = {
  owner:['dashboard','care','add','list','today','report','marketing','team','settings','perms','trash'],
  admin:['dashboard','care','add','list','today','report','marketing','team','settings','perms','trash'],
  bao:  ['dashboard','care','add','list','today'],
  phuc: ['dashboard','care','add','list','today'],
  tien: ['dashboard','care','add','list','today'],
  ttien:['dashboard','care','add','list','today'],
  hoe:  ['dashboard','care','add','list','today'],
  yen:  ['dashboard','care','add','list','today'],
  nguyet:['dashboard','care','list','marketing'],
  duy:  ['dashboard','care','list','marketing'],
  viet: ['dashboard','care','list','marketing'],
};
const _now = new Date();
const today = new Date(Date.UTC(_now.getFullYear(), _now.getMonth(), _now.getDate())); // ngày hiện tại (tự cập nhật mỗi ngày)
const D = n => { const d=new Date(today); d.setDate(d.getDate()+n);
  return d.toISOString().slice(0,10); };

const STATUS = {kcnc:'KCNC',ktt:'KTT',tuong_tac:'TƯƠNG TÁC',web:'WEB',
  khach_chan:'KHÁCH CHẶN',da_chot:'CHỐT NÓNG',chot_nguoi:'CHỐT NGUỘI',dang_care:'ĐANG CARE',hen:'HẸN'};
const CHOT_TT=['da_chot','chot_nguoi']; const isChot=tt=>CHOT_TT.includes(tt);
const BENH = {pcos:'PCOS',u_xo:'U xơ tử cung',tac_voi:'Tắc vòi trứng',amh_thap:'AMH thấp',
  noi_tiet:'Nội tiết kém',tinh_trung_yeu:'Tinh trùng yếu',muon_thai:'Muốn có thai tự nhiên',khac:'Khác'};
const NGUON = {facebook:'Facebook',tiktok:'TikTok',pancake:'Pancake',website:'Website',whatsapp:'WhatsApp',khac:'Khác'};

/* Nhân sự MKT (người kéo lead) */
const MKT = {nguyet:'Nguyệt', duy:'Duy', viet:'Việt'};

/* ====== BẢN TRẮNG ======
   Chưa có khách hàng. Chị nhập sau bằng:
   • nút "📥 Nhập file" (Excel/CSV) trong trang Thêm khách hàng, hoặc
   • form "Thêm khách hàng" để nhập tay từng khách.
   Team (Sale/MKT) đã được thiết lập sẵn. */
let DATA = [];

/* Chi phí marketing theo nguồn + MKT (USD) - demo */
let SPEND = [];  // chưa có chi phí marketing — nhập ở trang Báo cáo Marketing
let MREPORTS = []; // báo cáo marketing theo page/camp: {id,owner,ngay,ten_page,camp,tien,sl_mes,so_cmt,mes_tt,sd_chot}

/* ============ AUTH ============ */
let ME = null;
let TRASH = [];  // khách đã xoá (chỉ admin xem & khôi phục)
let ORDERS = {};  // lịch sử mua hàng theo khách: { customer_id: [ {id,ngay,san_pham,so_tien} ] }
let TASKS = [];   // việc cần làm / nhắc việc
let TARGETS = {}; // mục tiêu DT theo tháng: { 'owner|YYYY-MM': muc_tieu }
let REPORT_MONTH = (new Date()).toISOString().slice(0,7); // tháng đang xem ở Báo cáo
let TASK_Q = '';  // bộ lọc tên khách ở trang Việc cần làm
function setTaskQ(v){ TASK_Q=v; renderToday(); const el=document.getElementById('tk-q'); if(el){ el.focus(); try{el.setSelectionRange(v.length,v.length);}catch(e){} } }
let CARE_TODAY_Q='', CARE_TODAY_SALE='', CARE_TODAY_MKT='';  // bộ lọc bảng "Lịch chăm khách đã chốt" ở trang Việc cần làm
function setCareTodayQ(v){ CARE_TODAY_Q=v; renderToday(); const el=document.getElementById('cct-q'); if(el){ el.focus(); try{el.setSelectionRange(v.length,v.length);}catch(e){} } }
function setCareTodaySale(v){ CARE_TODAY_SALE=v; renderToday(); }
function setCareTodayMkt(v){ CARE_TODAY_MKT=v; renderToday(); }
let CARE_TODAY_FROM='', CARE_TODAY_TO='';
function setCareTodayFrom(v){ CARE_TODAY_FROM=v; renderToday(); }
function setCareTodayTo(v){ CARE_TODAY_TO=v; renderToday(); }
function clearCareTodayDate(){ CARE_TODAY_FROM=''; CARE_TODAY_TO=''; renderToday(); }
// Bộ lọc khoảng ngày dùng chung cho nhiều trang (mỗi trang 1 state)
const FILTERS = {
  dash:  { start:null, end:null, field:'tao', open:false, calBase:null, def:'thang_nay' },
  list:  { start:null, end:null, field:'tao', open:false, calBase:null, def:'all' },
  report:{ start:null, end:null, field:'tao', open:false, calBase:null, def:'all' },
  mkt:   { start:null, end:null, field:'tao', open:false, calBase:null, def:'all' },
  team:  { start:null, end:null, field:'tao', open:false, calBase:null, def:'all' },
};
function login(){
  const u=document.getElementById('u').value.trim().toLowerCase();
  const p=document.getElementById('p').value.trim();
  const acc=USERS[u];
  if(!acc || acc.pass!==p){ alert('Sai tài khoản hoặc mật khẩu. Dùng tài khoản demo bên dưới.'); return; }
  if(acc.active===false){ alert('Tài khoản này đã bị khóa. Liên hệ Admin để mở lại.'); return; }
  ME=acc; ME.uname=u;
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('who').textContent=acc.name;
  const roleLbl={owner:'Quyền: Chủ tài khoản (toàn quyền)',admin:'Quyền: Toàn quyền',sale:'Quyền: Sale',marketing:'Quyền: Marketing'};
  document.getElementById('role').textContent= roleLbl[acc.role];
  document.getElementById('todaytag').textContent='Hôm nay: '+today.toLocaleDateString('vi-VN');
  applyMenu();
  const allowed=PERMS[u]||[];
  go(allowed.includes('dashboard')?'dashboard':(allowed[0]||'dashboard')); renderAll();
}
// Hiện/ẩn menu theo quyền được cấp cho người đang đăng nhập
function applyMenu(){
  const allowed=PERMS[ME.uname]||[];
  document.querySelectorAll('#nav a').forEach(a=>{
    let v=a.dataset.v; if(v==='list_chot'||v==='list_chua') v='list';
    a.style.display=allowed.includes(v)?'flex':'none';
  });
}
function logout(){ if(ME)delete ME.uname; ME=null; location.reload(); }

/* ============ HELPER ============ */
function fullView(){ return true; } /* mọi vai trò (gồm Sale) đều xem được TẤT CẢ khách */
function myData(){ return fullView()?DATA:DATA.filter(d=>d.owner===ME.id); }
function flag(c){
  if(isChot(c.tt)) return 'won';
  if(!c.follow) return '';
  if(c.follow < D(-1)) return 'over';   // quá hạn ≥2 ngày
  if(c.follow < D(0))  return 'over';   // quá hạn 1 ngày
  if(c.follow === D(0))return 'warn';   // đến hạn hôm nay
  return '';
}
function rowClass(c){
  const f=flag(c); let cls='';
  if(c.muc==='nong'&&!isChot(c.tt)) cls+=' row-hot';
  if(f==='warn')cls+=' row-warn'; if(f==='over')cls+=' row-over'; if(f==='won')cls+=' row-won';
  return cls;
}
function mucPill(m){return `<span class="pill tag-${m}">${m==='nong'?'🔥 Nóng':m==='am'?'☀️ Ấm':'❄️ Lạnh'}</span>`;}
function isAdmin(){ return !!(ME && (ME.role==='admin'||ME.role==='owner')); }
/* Màu trạng thái khách — giúp phân loại nhanh bằng mắt */
const TT_COLOR={ da_chot:'#2f9e6e', chot_nguoi:'#2f7d9e', dang_care:'#b07d00', hen:'#7a5cc0',
  tuong_tac:'#3b82b0', web:'#5b7a8c', ktt:'#d77a2a', kcnc:'#8a8f98', khach_chan:'#e23d3d' };
const TT_ICON={ da_chot:'🔥', chot_nguoi:'❄️', dang_care:'🩺', hen:'📅', tuong_tac:'💬', web:'🌐', ktt:'📞', kcnc:'⏳', khach_chan:'⛔' };
function ttPill(tt){ const c=TT_COLOR[tt]||'#8a8f98', lbl=STATUS[tt]||tt||'—', ic=TT_ICON[tt]||'';
  return `<span style="display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;color:${c};background:${c}22;white-space:nowrap">${ic} ${lbl}</span>`; }
function benhLabel(c){return c.benh_list||BENH[c.benh]||'—';}
function phoneCell(c){return (c.phone||c.email||'')+(c.has_wa&&c.phone?' 💬':'');}
/* ====== SỬA / XOÁ THÔNG TIN KHÁCH ====== */
function canEdit(c){ return true; } /* mọi tài khoản đều được sửa khách + thêm đơn */
function canDelete(c){ return ME.role==='owner' || ME.role==='admin' || c.owner===ME.id; }
function deleteCustomer(id){
  const c=DATA.find(x=>String(x.id)===String(id)); if(!c)return;
  if(!canDelete(c)){ alert('Bạn không có quyền xoá khách này.'); return; }
  if(!confirm('Đưa khách "'+c.ten+'" vào thùng rác? Admin có thể khôi phục lại.')) return;
  c.da_xoa=true; const i=DATA.findIndex(x=>String(x.id)===String(id)); if(i>=0)DATA.splice(i,1); TRASH.unshift(c);
  alert('🗑️ Đã chuyển "'+c.ten+'" vào thùng rác'); renderAll();
}
/* ====== THÙNG RÁC (chỉ admin) ====== */
function renderTrash(){
  const el=document.getElementById('v-trash'); if(!el)return;
  if(!(ME.role==='owner'||ME.role==='admin')){ el.innerHTML='<div class="card empty">Chỉ Admin xem được thùng rác.</div>'; return; }
  let html=`<p style="color:var(--muted);font-size:13px;margin-bottom:12px">Khách bị xoá nằm ở đây. Admin có thể <b>♻️ Khôi phục</b> để lấy lại, hoặc <b>xoá vĩnh viễn</b>.</p>`;
  if(!TRASH.length){ el.innerHTML=html+'<div class="card empty">Thùng rác trống 🎉</div>'; return; }
  html+=`<div class="card" style="padding:0;overflow-x:auto"><table>
    <tr><th>Khách</th><th>SĐT</th><th>Quốc gia</th><th>Bệnh lý</th><th>Trạng thái</th><th>MKT</th><th>Sale</th><th>Thao tác</th></tr>`;
  TRASH.forEach(c=>{
    html+=`<tr><td><b>${c.ten}</b></td><td>${c.phone||'—'}</td><td>${c.quoc_gia||'—'}</td>
      <td>${benhLabel(c)}</td><td>${STATUS[c.tt]||c.tt}</td><td>${MKT[c.mkt]||'—'}</td><td>${SALES[c.owner]||'—'}</td>
      <td style="white-space:nowrap"><button class="btn" style="padding:4px 10px;font-size:12px" onclick="restoreCustomer('${c.id}')">♻️ Khôi phục</button>
      <button class="btn ghost" style="padding:4px 10px;font-size:12px;color:var(--over)" onclick="purgeCustomer('${c.id}')">Xoá vĩnh viễn</button></td></tr>`;
  });
  el.innerHTML=html+`</table></div>`;
}
function restoreCustomer(id){ const c=TRASH.find(x=>String(x.id)===String(id)); if(!c)return;
  c.da_xoa=false; const i=TRASH.findIndex(x=>String(x.id)===String(id)); if(i>=0)TRASH.splice(i,1); DATA.unshift(c);
  alert('♻️ Đã khôi phục "'+c.ten+'"'); renderAll(); }
function purgeCustomer(id){ const c=TRASH.find(x=>String(x.id)===String(id)); if(!c)return;
  if(!confirm('Xoá VĨNH VIỄN "'+c.ten+'"? Không khôi phục được nữa.'))return;
  const i=TRASH.findIndex(x=>String(x.id)===String(id)); if(i>=0)TRASH.splice(i,1);
  alert('Đã xoá vĩnh viễn.'); renderAll(); }
/* ====== LỊCH SỬ MUA HÀNG (mua lại lần 2, 3...) ====== */
function ordersOf(c){ return (ORDERS[String(c.id)]||[]).slice().sort((a,b)=>(''+(a.ngay||'')).localeCompare(''+(b.ngay||''))); }
function hasLan1(c){ return isChot(c.tt) || Number(c.dt)>0; }
function soLanMua(c){ return (hasLan1(c)?1:0) + ordersOf(c).length; }
function tongChiTieu(c){ return (Number(c.dt)||0) + ordersOf(c).reduce((s,o)=>s+(Number(o.so_tien)||0),0); }
function lanMuaBadge(c){ const n=soLanMua(c); if(n<1) return '';
  const st = n>=2 ? 'background:#fde68a;color:#92400e' : 'background:#eef2f0;color:#5a6b64';
  return ` <span title="Đã mua ${n} lần" style="${st};font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px;white-space:nowrap">🛒 ${n} lần</span>`; }

  const list=ordersOf(c); const n=soLanMua(c); const total=tongChiTieu(c);
  let h=`<div style="border-top:1px solid var(--line);margin-top:6px;padding-top:14px">
    <h2 class="sec" style="margin:0 0 8px">🧾 Lịch sử mua hàng — đã mua <b style="color:var(--teal-dark)">${n}</b> lần · Tổng chi tiêu <b style="color:var(--won,#16a34a)">$${total.toLocaleString('en-US')}</b></h2>`;
  if(n===0){ h+=`<p style="color:var(--muted);font-size:13px;margin:0 0 10px">Khách chưa có đơn nào. Khi chốt đơn đầu sẽ tính là Lần 1.</p>`; }
  else{
    h+=`<div class="card" style="padding:0;background:var(--cream);margin-bottom:12px;overflow-x:auto"><table>
      <tr><th style="padding:7px 10px">Lần</th><th>Ngày mua</th><th>Sản phẩm</th><th>Số tiền</th><th></th></tr>`;
    let idx=1;

    list.forEach(o=>{ h+=`<tr><td style="padding:7px 10px"><b>Lần ${idx}</b></td><td>${(''+(o.ngay||'')).slice(0,10)||'—'}</td><td>${o.san_pham||'—'}</td><td><b>$${(Number(o.so_tien)||0).toLocaleString('en-US')}</b></td>
      <td><span style="cursor:pointer;color:var(--over)" title="Xoá lần mua này" onclick="delOrder('${o.id}','${c.id}')">🗑️</span></td></tr>`; idx++; });
    h+=`</table></div>`;
  }
  h+=`<div style="background:var(--cream);border:1px dashed var(--line);border-radius:10px;padding:12px">
    <div style="font-weight:700;font-size:13px;margin-bottom:8px">➕ Thêm lần mua mới (mua lại)</div>
    <div style="display:grid;grid-template-columns:130px 1fr 110px auto;gap:8px;align-items:end">
      <div><label style="font-size:12px">Ngày mua</label><input id="o-ngay" type="date" value="${D(0)}"></div>
      <div><label style="font-size:12px">Sản phẩm</label><input id="o-sp" list="ago-sp-list" placeholder="VD: 2 AGO Eva + 1 AGO Mom"></div>
      <div><label style="font-size:12px">Số tiền ($)</label><input id="o-tien" type="number" value="0"></div>
      <button class="btn" type="button" onclick="addOrder('${c.id}')">➕ Thêm</button>
    </div>
    <div style="font-size:11px;color:var(--muted);margin-top:8px">Bấm tên sản phẩm để thêm nhanh (tên đã chuẩn hoá) — rồi sửa số lượng:</div>
    ${spChips('o-sp')}${spDatalist()}</div></div>`;
  return h;
}

function closeEdit(){ const ov=document.getElementById('edit-overlay'); if(ov)ov.style.display='none'; }
function collectEdit(){ const g=x=>document.getElementById(x).value;
  return { ten:g('e-ten'), phone:g('e-phone'), has_wa:document.getElementById('e-wa').checked, email:g('e-email'),
    quoc_gia:g('e-qg'), dia_chi:g('e-diachi')||null, nguon:g('e-nguon'), mkt:g('e-mkt')||null, owner:g('e-owner'), muc:g('e-muc'), tt:g('e-tt'),
    follow:g('e-follow')||null, benh:'khac', benh_list:(g('e-benh')||'').trim(), dt:Number(g('e-dt'))||0, ngay_chot:g('e-ngaychot')||null, sp:g('e-sp'), ghi:g('e-ghi'), ngay_capnhat:D(0) }; }
function saveEdit(e,id){ e.preventDefault(); const c=DATA.find(x=>String(x.id)===String(id)); if(!c)return;
  Object.assign(c, collectEdit()); if(isChot(c.tt)&&!c.loai_don)c.loai_don=c.khach_cu?'upsell':'moi';
  closeEdit(); alert('✅ Đã lưu thay đổi'); renderAll(); }

/* ============ NAV ============ */
const TITLES={dashboard:'Tổng quan',care:'Chăm sóc khách',add:'Thêm khách',list:'Khách hàng',
  list_chot:'Khách hàng đã chốt',list_chua:'Khách hàng chưa chốt',
  today:'Việc cần làm',report:'Báo cáo',marketing:'Marketing',team:'Sale team',settings:'Cài đặt',perms:'Tài khoản',trash:'Thùng rác'};
let LIST_MODE='all'; let LIST_ROWS=[];
function exportList(){
  const rows=LIST_ROWS||[];
  if(!rows.length){ alert('Không có khách trong danh sách để tải.'); return; }
  const cols=[['Tên khách','ten'],['SĐT','phone'],['Email','email'],['Quốc gia','quoc_gia'],['Nguồn',c=>NGUON[c.nguon]||c.nguon||''],['Bệnh lý',c=>c.benh_list||BENH[c.benh]||''],['Sản phẩm','sp'],['Mức',c=>({nong:'Nóng',am:'Ấm',lanh:'Lạnh'}[c.muc]||c.muc||'')],['Trạng thái',c=>STATUS[c.tt]||c.tt||''],['Ngày lên đơn','ngay_chot'],['Ngày follow','follow'],['MKT',c=>MKT[c.mkt]||''],['Sale',c=>SALES[c.owner]||''],['Địa chỉ','dia_chi'],['DT (USD)',c=>tongChiTieu(c)],['Ghi chú','ghi']];
  const esc2=v=>'<td>'+String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</td>';
  let html='<table border="1"><tr>'+cols.map(c=>'<th>'+c[0]+'</th>').join('')+'</tr>';
  rows.forEach(c=>{ html+='<tr>'+cols.map(col=>{const f=col[1]; return esc2(typeof f==='function'?f(c):c[f]);}).join('')+'</tr>'; });
  html+='</table>';
  const blob=new Blob(['﻿<html><head><meta charset="utf-8"></head><body>'+html+'</body></html>'],{type:'application/vnd.ms-excel'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  const tag=LIST_MODE==='chot'?'da-chot':LIST_MODE==='chua'?'chua-chot':'tat-ca';
  a.href=url; a.download='khach-hang-'+tag+'-'+D(0)+'.xls'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}
document.getElementById('nav').addEventListener('click',e=>{
  const a=e.target.closest('a'); if(!a)return; go(a.dataset.v);
});
function go(v){
  let view=v;
  if(v==='list_chot'){view='list';LIST_MODE='chot';}
  else if(v==='list_chua'){view='list';LIST_MODE='chua';}
  else if(v==='list'){LIST_MODE='all';}
  document.querySelectorAll('#nav a').forEach(a=>a.classList.toggle('active',a.dataset.v===v));
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  document.getElementById('v-'+view).classList.add('active');
  document.getElementById('title').textContent=TITLES[v]||TITLES[view];
  if(view==='list') renderList();
  else if(view==='care') renderCare();
  else if(view==='today') renderToday();
}

function renderAlert(){
  const due=myData().filter(c=>flag(c)==='warn').length;
  const over=myData().filter(c=>flag(c)==='over').length;
  const bar=document.getElementById('alertbar');
  if(due||over){ bar.style.display='block';
    bar.innerHTML=`🔔 Bạn có <b>${due}</b> khách cần follow hôm nay và <b style="color:#e23d3d">${over}</b> khách <b>quá hạn</b>. `+
      `<a style="color:#8a6400;font-weight:700;cursor:pointer" onclick="go('today')">Xem việc cần làm →</a>`;
  } else bar.style.display='none';
}

/* ====== BỘ LỌC KHOẢNG NGÀY (presets + lịch 2 tháng) ====== */
function dstr(dt){return dt.toISOString().slice(0,10);}
function addDays(dt,n){const x=new Date(dt);x.setUTCDate(x.getUTCDate()+n);return x;}
function monthStart(dt){return new Date(Date.UTC(dt.getUTCFullYear(),dt.getUTCMonth(),1));}
const PRESETS=[
 {k:'hom_nay',l:'Hôm nay',g:t=>[dstr(t),dstr(t)]},
 {k:'hom_qua',l:'Hôm qua',g:t=>[dstr(addDays(t,-1)),dstr(addDays(t,-1))]},
 {k:'tuan_nay',l:'Tuần này',g:t=>{const o=(t.getUTCDay()===0?6:t.getUTCDay()-1);return [dstr(addDays(t,-o)),dstr(t)];}},
 {k:'tuan_truoc',l:'Tuần trước',g:t=>{const o=(t.getUTCDay()===0?6:t.getUTCDay()-1);const mon=addDays(t,-o-7);return [dstr(mon),dstr(addDays(mon,6))];}},
 {k:'7ngay',l:'7 ngày trước',g:t=>[dstr(addDays(t,-6)),dstr(t)]},
 {k:'thang_nay',l:'Tháng này',g:t=>[dstr(monthStart(t)),dstr(t)]},
 {k:'thang_truoc',l:'Tháng trước',g:t=>{const y=t.getUTCFullYear(),m=t.getUTCMonth();return [dstr(new Date(Date.UTC(y,m-1,1))),dstr(new Date(Date.UTC(y,m,0)))];}},
 {k:'30ngay',l:'30 ngày trước',g:t=>[dstr(addDays(t,-29)),dstr(t)]},
 {k:'60ngay',l:'60 ngày trước',g:t=>[dstr(addDays(t,-59)),dstr(t)]},
];
function reRender(key){ ({dash:renderDash,list:renderList,report:renderReport,mkt:renderMarketing,team:renderTeam}[key])(); }
// Tính chỉ số 1 nhóm khách: số khách, thị trường, tỷ lệ tương tác/chốt, DT mới/chăm sóc/tổng
function saleStats(sd){
  const total=sd.length;
  const interacted=sd.filter(c=>['tuong_tac','dang_care','hen','da_chot','chot_nguoi'].includes(c.tt)).length;
  const won=sd.filter(c=>isChot(c.tt));
  const dtMoi=won.filter(c=>c.loai_don==='moi').reduce((s,c)=>s+(Number(c.dt)||0),0);
  const dtCu =won.filter(c=>c.loai_don==='upsell').reduce((s,c)=>s+(Number(c.dt)||0),0)
              + won.reduce((s,c)=>s+ordersOf(c).reduce((a,o)=>a+(Number(o.so_tien)||0),0),0);
  const markets=[...new Set(sd.map(c=>c.quoc_gia).filter(Boolean))];
  return {total, won:won.length, dtMoi, dtCu, dtTong:dtMoi+dtCu, markets,
    rTuongtac: total?Math.round(interacted/total*100):0,
    rChot: total?Math.round(won.length/total*100):0};
}
function applyPreset(key,k){const f=FILTERS[key];const r=PRESETS.find(x=>x.k===k).g(today);f.start=r[0];f.end=r[1];f.calBase=monthStart(new Date(r[0]));reRender(key);}
function toggleFilter(key){FILTERS[key].open=!FILTERS[key].open;reRender(key);}
function setField(key,fl){FILTERS[key].field=fl;reRender(key);}
function navCal(key,n){const f=FILTERS[key];const b=f.calBase||monthStart(today);f.calBase=new Date(Date.UTC(b.getUTCFullYear(),b.getUTCMonth()+n,1));reRender(key);}
function pickDay(key,ds){const f=FILTERS[key];
  if(!f.start||(f.start&&f.end)){f.start=ds;f.end=null;}
  else{ if(ds>=f.start)f.end=ds; else {f.end=f.start;f.start=ds;} }
  reRender(key);}
function clearFilter(key){const f=FILTERS[key];f.start=null;f.end=null;f.open=false;f.calBase=null;reRender(key);}
function getSel(key){const f=FILTERS[key]; if(f.start&&f.end)return{s:f.start,e:f.end}; if(f.start)return{s:f.start,e:f.start}; return null;}
function getRange(key){
  const sel=getSel(key); if(sel) return sel;
  if(FILTERS[key].def==='all') return {s:'0000-01-01',e:'9999-12-31'};
  const r=PRESETS.find(x=>x.k==='thang_nay').g(today); return {s:r[0],e:r[1]};
}
function rangeLabel(key){const sel=getSel(key); if(sel) return sel.s+' → '+sel.e;
  return FILTERS[key].def==='all' ? 'Tất cả thời gian' : (()=>{const r=getRange(key);return r.s+' → '+r.e;})();}
function calMonthHTML(key,base){
  const y=base.getUTCFullYear(),m=base.getUTCMonth();
  const dim=new Date(Date.UTC(y,m+1,0)).getUTCDate();
  const first=new Date(Date.UTC(y,m,1));
  const lead=(first.getUTCDay()===0?6:first.getUTCDay()-1);
  const sel=getSel(key); const s=sel?sel.s:null, e=sel?sel.e:null;
  let cells='';
  for(let i=0;i<lead;i++)cells+='<div></div>';
  for(let d=1;d<=dim;d++){
    const ds=dstr(new Date(Date.UTC(y,m,d)));
    const inR=sel&&ds>=s&&ds<=e, isEnd=(ds===s||ds===e), isToday=ds===dstr(today);
    let st='padding:7px 0;text-align:center;border-radius:7px;cursor:pointer;font-size:13px;';
    if(inR) st+= isEnd?'background:var(--teal);color:#fff;font-weight:700;':'background:var(--cream);';
    if(isToday&&!inR) st+='box-shadow:inset 0 0 0 1px var(--sage);';
    cells+=`<div style="${st}" onclick="pickDay('${key}','${ds}')">${d}</div>`;
  }
  return `<div style="flex:1">
    <div style="text-align:center;font-weight:700;margin-bottom:8px">Thg ${String(m+1).padStart(2,'0')}  ${y}</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;font-size:11px;color:var(--muted);margin-bottom:4px">

/* ====== TRUNG TÂM CHĂM SÓC THÔNG MINH ====== */
function careScore(c){            // điểm càng cao = càng gấp
  if(['da_chot','chot_nguoi','khach_chan'].includes(c.tt)) return -1;
  let s=0; const f=flag(c);
  if(f==='over'){ s+=50; const days=Math.round((new Date(D(0))-new Date(c.follow))/86400000); s+=Math.min(days*5,20); }
  if(f==='warn') s+=22;
  if(c.muc==='nong') s+=25;
  if(c.khach_cu && c.ngay_upsale && c.ngay_upsale<=D(0)) s+=30;
  if(c.tt==='moi_vao') s+=18;
  if(c.tt==='da_bao_gia') s+=15;
  if(c.tt==='da_tu_van') s+=10;
  if(c.tt==='khong_phan_hoi') s+=8;
  return s;
}
function nextAction(c){
  const f=flag(c);
  if(c.khach_cu && c.ngay_upsale && c.ngay_upsale<=D(0)) return '⬆️ Nhắc khách cũ mua lại / nâng combo';
  if(f==='over') return '📞 GỌI NGAY — quá hạn follow';
  if(c.muc==='nong') return '🔥 Ưu tiên chốt khách nóng';
  if(c.tt==='da_bao_gia') return '💰 Chốt đơn — đã báo giá';
  if(c.tt==='moi_vao') return '🌱 Tư vấn khách mới (bước 1 lộ trình)';
  if(c.tt==='da_tu_van') return '📝 Gửi báo giá';
  if(f==='warn') return '⏰ Follow theo lịch hẹn';
  if(c.tt==='khong_phan_hoi') return '🔁 Nhắn lại / đổi kênh liên hệ';
  return '👀 Theo dõi tiếp';
}
/* Sản phẩm AGO phù hợp theo bệnh lý/nhu cầu */
const SP_GOI = {pcos:'AGO WOMEN', amh_thap:'AGO EVA', u_xo:'AGO TUMOR', tac_voi:'AGO EVA',

/* Gợi ý việc cần làm cụ thể cho TỪNG khách (tối đa ~5 ý) */
function careSuggestions(c){
  const out=[]; const f=flag(c); const sp=SP_GOI[c.benh]||c.sp;
  // 1. Quá hạn -> nhắc xử lý trước
  if(f==='over') out.push('⚠️ Đã quá hạn — liên hệ lại NGAY, mở lời nhẹ nhàng vì phản hồi muộn.');
  // 2. Up-sale khách cũ đến hạn
  if(c.khach_cu && c.ngay_upsale && c.ngay_upsale<=D(0)){
    out.push('Hỏi thăm kết quả/cảm nhận sau liệu trình trước.');
    out.push('Đề xuất mua lại hoặc nâng combo phù hợp giai đoạn hiện tại'+(sp?` (gợi ý: ${sp}).`:'.'));
  }
  // 3. Theo trạng thái
  if(c.tt==='moi_vao'){
    out.push('Phản hồi trong 5 phút đầu + cảm ơn khách đã quan tâm.');
    out.push(`Hỏi rõ tình trạng/nhu cầu (${BENH[c.benh]||'nhu cầu'}) để tư vấn đúng.`);
    out.push('Gửi tài liệu giới thiệu + review khách thật'+(sp?` về ${sp}.`:'.'));
  } else if(c.tt==='da_tu_van'){
    out.push('Chốt lại nhu cầu chính & ngân sách của khách.');
    out.push('Gửi báo giá + ưu đãi combo phù hợp'+(sp?` (${sp}).`:'.'));
    out.push('Hẹn ngày phản hồi cụ thể (đặt lịch follow).');
  } else if(c.tt==='da_bao_gia'){
    out.push('Hỏi khách còn băn khoăn gì: giá / niềm tin / cần hỏi chồng.');
    out.push('Đưa lý do chốt ngay: ưu đãi có hạn, lộ trình theo tháng, suất tư vấn.');
    out.push('Hướng dẫn cách đặt cọc / thanh toán để chốt đơn.');
  } else if(c.tt==='hen_follow'){
    out.push('Liên hệ đúng lịch hẹn, mở đầu bằng điều khách quan tâm lần trước.');
    out.push('Nhắc lại lợi ích chính & ưu đãi còn hiệu lực.');
  } else if(c.tt==='khong_phan_hoi'){
    out.push('Đổi kênh liên hệ (WhatsApp / gọi / email).');
    out.push(`Nhắn tin giá trị, không spam: chia sẻ case tương tự (${BENH[c.benh]||'nhu cầu'}).`);
    out.push('Sau 2 lần không phản hồi → hạ mức độ & dời lịch follow xa hơn.');
  }
  // 4. Theo mức độ
  if(c.muc==='nong') out.push('🔥 Khách nóng: ưu tiên đẩy nhanh tới bước chốt trong hôm nay.');
  if(c.muc==='lanh') out.push('Khách lạnh: nuôi dưỡng dài hạn, thêm vào danh sách gửi nội dung định kỳ.');
  // 5. Thiếu thông tin liên hệ
  if(!c.phone && !c.email) out.push('Bổ sung SĐT/WhatsApp hoặc email để chăm sóc được.');
  return out.slice(0,5);
}

function careCell(base,a,b){
  if(!base) return '<span style="color:var(--line)">—</span>';
  const s=addToDate(base,a), e=addToDate(base,b), t=D(0);
  const due = t>=s && t<=e, over = t>e;
  const col = due?'#b07d00':(over?'var(--muted)':'var(--text)');
  return `<span style="color:${col};${due?'font-weight:700':''}">${s} → ${e}</span>${due?' ⏰':''}`;
}
function custTitle(c){
  return [c.ten, 'SĐT: '+(c.phone||'—'), 'Quốc gia: '+(c.quoc_gia||'—'), 'Nguồn: '+(NGUON[c.nguon]||'—'),
    'MKT: '+(MKT[c.mkt]||'—')+' · Sale: '+(SALES[c.owner]||'—'), 'Bệnh lý: '+(c.benh_list||BENH[c.benh]||'—'),
    'SP: '+(c.sp||'—'), 'Trạng thái: '+(STATUS[c.tt]||c.tt||'—'), 'DT: $'+tongChiTieu(c),
    c.dia_chi?('Địa chỉ: '+c.dia_chi):'', c.ghi?('Ghi chú: '+c.ghi):''].filter(Boolean).join('\n').replace(/"/g,'&quot;');
}

function careRows(){
  const s=(document.getElementById('care-search')?.value||'').toLowerCase();
  const fSale=document.getElementById('care-sale')?.value||'';
  const fMkt=document.getElementById('care-mkt')?.value||'';
  let arr=DATA.filter(c=>isChot(c.tt));
  if(fSale) arr=arr.filter(c=>c.owner===fSale);
  if(fMkt) arr=arr.filter(c=>c.mkt===fMkt);
  if(s) arr=arr.filter(c=>`${c.ten} ${c.phone} ${c.ghi} ${c.cham_kq||''} ${c.su_dung||''}`.toLowerCase().includes(s));
  arr.sort((a,b)=>(b.ngay_chot||'').localeCompare(a.ngay_chot||''));
  return arr;
}

function syncTwins(id,col,val){ const s=(val==null?'':String(val)); document.querySelectorAll('[data-k="'+id+'|'+col+'"]').forEach(el=>{ if(el!==document.activeElement && el.value!==s) el.value=s; }); }
async function saveCol(id,col,val){ const c=DATA.find(x=>String(x.id)===String(id)); if(c)c[col]=val; syncTwins(id,col,val); if(!window.sb){toast('✓ Đã lưu');return;} try{ const {error}=await sb.from('customers').update({[col]:val}).eq('id',id); if(error){toast('⚠ Lỗi lưu, thử lại',false);} else {toast('✓ Đã lưu');} }catch(e){toast('⚠ Lỗi lưu, thử lại',false);} }
let __saveTimers={};
function debSave(col,id,v){ const k=col+'|'+id; clearTimeout(__saveTimers[k]); if(v!==undefined){const c=DATA.find(x=>String(x.id)===String(id)); if(c)c[col]=v;} __saveTimers[k]=setTimeout(()=>{ saveCol(id,col,v); },700); }

function saveCustomer(e){
  e.preventDefault();
  const g=id=>document.getElementById(id).value;
  const owner = ME.role==='sale' ? ME.id : g('f-owner');
  const benhs=[...document.querySelectorAll('.benh-chk:checked')].map(ch=>ch.value);
  const sps=[...document.querySelectorAll('.sp-chk:checked')].map(ch=>{
    const q=ch.parentNode.querySelector('.sp-qty').value||1; return `${q} ${ch.value}`;});
  DATA.unshift({id:Date.now(),owner:owner,mkt:g('f-mkt'),ten:g('f-ten'),phone:g('f-phone'),
    has_wa:document.getElementById('f-wa').checked,
    email:g('f-email'),quoc_gia:g('f-qg'),nguon:g('f-nguon'),
    benh:benhs[0]||'khac', benh_list:benhs.map(b=>BENH[b]).join(', '),
    sp:sps.join(', ')||'—',
    muc:g('f-muc'),tt:g('f-tt'),follow:g('f-follow'),ghi:g('f-ghi'),dt:Number(g('f-dt'))||0,ly:g('f-ly')});
  alert('✅ Đã lưu khách hàng "'+g('f-ten')+'"');
  e.target.reset(); renderAll(); go('list');
}

/* ====== NHẬP EXCEL / CSV ====== */
function revFind(map,text){ if(!text)return ''; const t=(''+text).trim().toLowerCase();
  return Object.keys(map).find(k=>(''+map[k]).toLowerCase()===t)||''; }
function normDate(s){ if(!s)return ''; const d=new Date(s); return isNaN(d)?(''+s):d.toISOString().slice(0,10); }
function downloadTemplate(){
  const headers=['Tên khách hàng','Số điện thoại','WhatsApp','Email','Quốc gia','Nguồn','MKT','Sale','Bệnh lý','Sản phẩm','Mức độ','Trạng thái','Ngày follow','Doanh thu','Ghi chú'];
  const ex=['Anna Tran','+1 408-555-0000','Có','anna@gmail.com','US','Facebook','Mai','Lan','PCOS','2 AGO WOMEN','Nóng','Mới vào','2026-06-25','0','Khách quan tâm combo'];
  const ws=XLSX.utils.aoa_to_sheet([headers,ex]);
  const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Khách hàng');
  XLSX.writeFile(wb,'mau_khach_hang_CCP.xlsx');
}
function importExcel(){
  const f=document.getElementById('xls-file').files[0];
  if(!f){ alert('Chọn file Excel/CSV trước.'); return; }
  const rd=new FileReader();
  rd.onload=ev=>{
    try{
      const wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
      let n=0;
      rows.forEach(r=>{
        const get=(...keys)=>{ for(const k of keys){ const kk=Object.keys(r).find(h=>(''+h).trim().toLowerCase()===k.toLowerCase());
          if(kk!==undefined && r[kk]!=='') return (''+r[kk]).trim(); } return ''; };
        const ten=get('Tên khách hàng','Tên','Name'); if(!ten) return;
        const mucT=get('Mức độ','Mức').toLowerCase();
        const muc= (mucT.includes('nóng')||mucT==='nong')?'nong' : (mucT.includes('lạnh')||mucT==='lanh')?'lanh':'am';
        const benhT=get('Bệnh lý','Bệnh lý / nhu cầu','Nhu cầu');
        const benhKeys=benhT.split(/[;,\/]/).map(s=>revFind(BENH,s.trim())).filter(Boolean);
        const waT=get('WhatsApp','Đã có WhatsApp').toLowerCase();
        const tt=revFind(STATUS,get('Trạng thái'))||'tuong_tac';
        const c={ id:Date.now()+n,
          owner: revFind(SALES,get('Sale','Sale chăm khách')) || (ME.role==='sale'?ME.id:Object.keys(SALES)[0]),
          mkt: revFind(MKT,get('MKT','MKT phụ trách')) || Object.keys(MKT)[0],
          ten, phone:get('Số điện thoại','SĐT','Số điện thoại / WhatsApp','Phone'),
          has_wa:['có','x','yes','true','1','đã có'].includes(waT),
          email:get('Email'), quoc_gia:get('Quốc gia','Thị trường','Country'),
          nguon:revFind(NGUON,get('Nguồn','Nguồn khách'))||'khac',
          benh:benhKeys[0]||'khac', benh_list:benhKeys.map(k=>BENH[k]).join(', ')||benhT,
          sp:get('Sản phẩm','Sản phẩm quan tâm')||'—',
          muc, tt, follow:normDate(get('Ngày follow','Ngày cần follow tiếp theo')),
          ghi:get('Ghi chú','Ghi chú tư vấn'), dt:Number(get('Doanh thu','Doanh thu (USD)'))||0,
          ly:'', khach_cu:false, ngay_tao:D(0), ngay_capnhat:D(0) };
        if(isChot(c.tt)) c.loai_don='moi';
        DATA.unshift(c); n++;
      });
      alert('✅ Đã nhập '+n+' khách hàng từ file.');
      document.getElementById('xls-file').value='';
      renderAll(); go('list');
    }catch(err){ alert('Lỗi đọc file: '+err.message); }
  };
  rd.readAsArrayBuffer(f);
}

function countryGroup(q){ q=(q||'').toUpperCase().trim().replace(/[.\s]/g,'');
  if(['US','USA','UNITEDSTATES','MỸ','MY'].includes(q)) return 'US';
  if(['CA','CAD','CAN','CANADA'].includes(q)) return 'Canada';
  if(['EU','EUR','EURO','EUROPE','DE','FR','IT','ES','NL','BE','AT','PT','IE','FI','GR','LU','SK','SI','EE','LV','LT','CY','MT','HR','UK','GB','CH','SE','NO','DK','PL','CZ'].includes(q)) return 'Euro';
  return 'Khác'; }
function renderRevenue(rows){ const el=document.getElementById('list-revenue'); if(!el) return;
  const rev={US:{n:0,s:0},Canada:{n:0,s:0},Euro:{n:0,s:0},'Khác':{n:0,s:0}};
  rows.forEach(c=>{ const g=countryGroup(c.quoc_gia); rev[g].n++; rev[g].s+=tongChiTieu(c); });
  const tot=rows.reduce((a,c)=>a+tongChiTieu(c),0);
  const cards=[['US','🇺🇸 US'],['Canada','🇨🇦 Canada'],['Euro','🇪🇺 Euro'],['Khác','🌍 Khác']]
    .filter(([k])=>rev[k].n>0||k!=='Khác')
    .map(([k,lbl])=>`<div class="rev-card"><div class="rl">${lbl}</div><div class="rv">$${rev[k].s.toLocaleString('en-US')}</div><div class="rn">${rev[k].n} khách</div></div>`).join('');
  el.innerHTML=`<div class="rev-grid">${cards}<div class="rev-card" style="background:var(--cream)"><div class="rl">💰 Tổng cộng</div><div class="rv">$${tot.toLocaleString('en-US')}</div><div class="rn">${rows.length} khách</div></div></div>`;
}

  let rows=myData().filter(c=>{
    if(!inDateRange('list',c)) return false;
    if(fSale && c.owner!==fSale) return false;
    if(fMkt && c.mkt!==fMkt) return false;
    if(fChot==='chot' && !isChot(c.tt)) return false;
    if(fChot==='chua' && isChot(c.tt)) return false;

    if(s && !(`${c.ten} ${c.phone} ${c.ghi} ${c.benh_list||''} ${c.dia_chi||''} ${SALES[c.owner]||''} ${MKT[c.mkt]||''} ${c.ngay_tao||''} ${c.follow||''} ${c.ngay_capnhat||''}`.toLowerCase().includes(s))) return false;
    return true;
  });
  LIST_ROWS=rows;
  const _mine=myData(); const _nChot=_mine.filter(c=>isChot(c.tt)).length; const _nChua=_mine.length-_nChot;
  let t=`<div style="padding:10px 14px;font-size:13px;border-bottom:1px solid var(--line);background:var(--cream)">

  const noteCell=c=>{
    const g=(''+(c.ghi||'')).trim();

      ${fullView()?`<td class="c-mkt">${MKT[c.mkt]||'—'}</td><td class="c-sale">${SALES[c.owner]||'—'}</td>`:''}
      <td class="c-ghi" style="max-width:260px">${noteCell(c)}</td>
      <td class="c-dt">${tongChiTieu(c)?'$'+tongChiTieu(c).toLocaleString('en-US'):'—'}</td></tr>`;
  });
  t+=`</table>`;
  document.getElementById('list-table').innerHTML=t;
  renderRevenue(rows);
  applyColVis();
}

/* ====== VIỆC CẦN LÀM / NHẮC VIỆC ====== */
const TASK_LOAI={cham_chot:'Chăm khách đã chốt',cham_chua:'Chăm khách chưa chốt',gui_tt:'Gửi thêm thông tin',nhac:'Nhắc nhở'};
function taskCustName(t){ const c=DATA.find(x=>String(x.id)===String(t.customer_id)); return c?c.ten:''; }
function myTasks(){ const closed=new Set(DATA.filter(c=>isChot(c.tt)).map(c=>String(c.id)));
  const all=TASKS.filter(t=>!t.xong).filter(t=> !(t.loai==='cham_chua' && t.customer_id!=null && closed.has(String(t.customer_id))));
  return all; /* công khai: mọi sale đều thấy việc của nhau để nhắc nhau */ }
function taskBucket(t){ const h=t.han||''; if(!h) return 'upcoming'; if(h<D(0))return 'over'; if(h===D(0))return 'today'; return 'upcoming'; }
function renderToday(){
  const d=myData();

      <div><label>Khách (nếu có)</label><select id="t-cus"><option value="">— Không gắn khách —</option>${myData().map(c=>`<option value="${c.id}">${c.ten}</option>`).join('')}</select></div>

  const taskRow=t=>{ const cn=taskCustName(t); const tc=DATA.find(x=>String(x.id)===String(t.customer_id));

        return `<tr style="background:#eefaf3"><td><span class="pill" style="background:var(--cream);color:var(--teal-dark)">${TASK_LOAI[t.loai]||t.loai}</span></td><td>${khachCell}</td><td>${t.noi_dung||''}</td><td>${t.han||'—'}</td><td>${SALES[t.owner]||'—'}</td><td style="text-align:center;white-space:nowrap"><span style="cursor:pointer;color:var(--teal-dark);font-weight:700" onclick="reactivateTask('${t.id}')">🔄 Kích hoạt lại</span></td></tr>`; };

    }
  }
  const fb=(title,arr,color)=> arr.length?`<h2 class="sec" style="color:${color}">${title} (${arr.length})</h2><div class="card" style="padding:0;overflow-x:auto"><table><tr><th>Khách</th><th>SĐT</th><th>Trạng thái</th><th>Ngày follow</th></tr>${arr.map(c=>`<tr class="${rowClass(c)}"><td><b style="cursor:pointer;color:var(--teal-dark)" title="${custTitle(c)}" onclick="editCustomer('${c.id}')">${c.ten}</b></td><td>${c.phone||'—'}</td><td>${ttPill(c.tt)}</td><td>${c.follow||'—'}</td></tr>`).join('')}</table></div>`:'';
  html+=`<h2 class="sec" style="margin-top:22px">Nhắc follow tự động</h2>`+((over.length||due.length)? fb('Quá hạn follow',over,'var(--over)')+fb('Đến hạn hôm nay',due,'#b07d00') : `<div class="card empty">Không có follow nào đến hạn.</div>`);

function monthDT(owner,ym){ return DATA.filter(c=>c.owner===owner && isChot(c.tt) && ((c.ngay_chot||c.ngay_capnhat||c.ngay_tao||'')+'').slice(0,7)===ym).reduce((s,c)=>s+tongChiTieu(c),0); }
function setReportMonth(v){ if(v) REPORT_MONTH=v; renderReport(); }
async function saveTarget(owner){
  const el=document.getElementById('tg-'+owner); if(!el) return;
  const val=Number(el.value)||0;
  if(window.sb){
    const { error }=await sb.from('sale_targets').upsert({owner:owner, thang:REPORT_MONTH, muc_tieu:val},{onConflict:'owner,thang'});
    if(error){ alert('Lỗi lưu mục tiêu: '+error.message); return; }
  }
  TARGETS[owner+'|'+REPORT_MONTH]=val; renderReport();
}
let REPORT_DONUT_SALE='';
function setReportDonutSale(v){ REPORT_DONUT_SALE=v; renderReport(); }
function statusDonutHTML(arr){
  const order=['kcnc','ktt','tuong_tac','web','khach_chan','da_chot','chot_nguoi','dang_care','hen'];
  const cnt={}; let total=0;
  arr.forEach(c=>{ const k=order.includes(c.tt)?c.tt:'kcnc'; cnt[k]=(cnt[k]||0)+1; total++; });
  const segs=order.filter(k=>cnt[k]).map(k=>({k,n:cnt[k],pct: total?cnt[k]/total:0}));
  const C=439.82, r=70, cx=90, cy=90, sw=28; let acc=0, circles='';
  segs.forEach(s=>{ const len=s.pct*C; circles+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${TT_COLOR[s.k]||'#8a8f98'}" stroke-width="${sw}" stroke-dasharray="${len.toFixed(2)} ${(C-len).toFixed(2)}" stroke-dashoffset="${(-acc*C).toFixed(2)}" transform="rotate(-90 ${cx} ${cy})"></circle>`; acc+=s.pct; });
  const svg=`<svg viewBox="0 0 180 180" width="180" height="180" style="flex-shrink:0">${total?circles:`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#eee" stroke-width="${sw}"></circle>`}<text x="${cx}" y="${cy-2}" text-anchor="middle" font-size="32" font-weight="800" fill="var(--teal-dark)">${total}</text><text x="${cx}" y="${cy+20}" text-anchor="middle" font-size="12" fill="var(--muted)">khách</text></svg>`;
  const legend=segs.map(s=>`<div style="display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:7px"><span style="display:inline-block;width:13px;height:13px;border-radius:3px;background:${TT_COLOR[s.k]||'#8a8f98'};flex-shrink:0"></span><span style="flex:1">${(TT_ICON[s.k]||'')} ${STATUS[s.k]||s.k}</span><b>${s.n}</b><span style="color:var(--muted);width:48px;text-align:right">${Math.round(s.pct*100)}%</span></div>`).join('');

  });

  document.getElementById('v-marketing').innerHTML=html;

let MEDIT=null;
function editMReport(id){
  const r=MREPORTS.find(x=>String(x.id)===String(id)); if(!r) return;
  const set=(k,v)=>{const el=document.getElementById(k); if(el) el.value=v;};
  set('m-ngay',r.ngay||D(0)); set('m-owner',r.owner); set('m-page',r.ten_page==='—'?'':r.ten_page);
  set('m-camp',r.camp==='—'?'':r.camp); set('m-tien',r.tien); set('m-mes',r.sl_mes);
  set('m-cmt',r.so_cmt); set('m-tt',r.mes_tt); set('m-chot',r.sd_chot);
  MEDIT=id;
  const f=document.getElementById('m-ngay'); if(f){ f.scrollIntoView({behavior:'smooth',block:'center'}); }
  alert('✏️ Đang sửa báo cáo này — chỉnh xong bấm "Lưu báo cáo".');
}
async function saveMReport(e){
  e.preventDefault(); const g=id=>document.getElementById(id).value;
  const data={ owner:g('m-owner'), ngay:g('m-ngay')||D(0),
    ten_page:(g('m-page')||'').trim()||'—', camp:(g('m-camp')||'').trim()||'—',
    tien:Number(g('m-tien'))||0, sl_mes:Number(g('m-mes'))||0, so_cmt:Number(g('m-cmt'))||0,
    mes_tt:Number(g('m-tt'))||0, sd_chot:Number(g('m-chot'))||0 };
  let error;
  if(MEDIT){ ({ error }=await sb.from('mkt_reports').update(data).eq('id',MEDIT)); }
  else { ({ error }=await sb.from('mkt_reports').insert({ id:Date.now(), ...data })); }
  if(error){ alert('Lưu lỗi: '+error.message); return; }
  const wasEdit=MEDIT; MEDIT=null;
  await loadAll(); renderMarketing(); alert(wasEdit?'✅ Đã cập nhật báo cáo.':'✅ Đã lưu báo cáo "'+data.ten_page+'"');
}
async function deleteMReport(id){
  if(!confirm('Xoá báo cáo này?')) return;
  const { error }=await sb.from('mkt_reports').delete().eq('id', id);
  if(error){ alert('Lỗi xoá: '+error.message); return; }
  await loadAll(); renderMarketing();
}

function canManage(){ return (PERMS[ME.uname]||[]).includes('perms'); }
function togglePerm(u,m){
  const p=PERMS[u]||(PERMS[u]=[]); const i=p.indexOf(m);
  if(i>=0)p.splice(i,1); else p.push(m);
  if(ME && ME.uname===u) applyMenu();
  renderPerms();
}
function createAccount(e){
  e.preventDefault();
  const g=id=>document.getElementById(id).value.trim();
  const u=g('na-user').toLowerCase(), name=g('na-name'), pass=g('na-pass')||'123', role=g('na-role');
  if(!u||!name){ alert('Nhập tên và tài khoản.'); return; }
  if(USERS[u]){ alert('Tài khoản "'+u+'" đã tồn tại.'); return; }
  let id;
  if(role==='sale'){ id='S'+(Object.keys(SALES).length+1); SALES[id]=name; }
  else if(role==='marketing'){ id='M'+(Object.keys(MKT).length+1); MKT[id]=name; }
  else { id='A'+Date.now(); }
  USERS[u]={pass,name,role,id,active:true};
  PERMS[u]=[...(DEFAULT_PERMS[role]||DEFAULT_PERMS.sale)];
  alert('✅ Đã tạo tài khoản "'+name+'" ('+u+' / '+pass+'), vai trò '+role+'.');
  e.target.reset(); renderAll();
}
function lockAccount(u){
  if(u==='owner'||u===ME.uname){ alert('Không thể khóa tài khoản này.'); return; }
  USERS[u].active = USERS[u].active===false ? true : false;
  renderPerms();
}
function delAccount(u){
  if(u==='owner'||u===ME.uname){ alert('Không thể xóa tài khoản này.'); return; }
  if(!confirm('Xóa tài khoản "'+USERS[u].name+'"? Khách của họ vẫn được giữ lại.')) return;
  const a=USERS[u]; if(a.role==='sale')delete SALES[a.id]; if(a.role==='marketing')delete MKT[a.id];
  delete USERS[u]; delete PERMS[u]; renderPerms();
}

  Object.entries(USERS).forEach(([u,a])=>{
    const locked=a.active===false;
    html+=`<tr><td><b>${a.name}</b></td><td>${u}</td><td>${a.role}</td>

/* ---- Bảo mật 2 lớp (2FA / TOTP) ---- */
async function ensureMFA(){
  try{
    const { data: aal, error } = await sb.auth.mfa.getAuthenticatorAssuranceLevel();
    if(error || !aal) return true;
    if(aal.nextLevel==='aal2' && aal.currentLevel!=='aal2'){
      const { data: factors } = await sb.auth.mfa.listFactors();
      const totp = (factors && factors.totp ? factors.totp : []).find(f=>f.status==='verified');
      if(!totp) return true; // chưa bật 2FA -> bỏ qua
      const { data: ch, error: ce } = await sb.auth.mfa.challenge({ factorId: totp.id });
      if(ce){ alert('Lỗi 2FA: '+ce.message); return false; }
      const code = prompt('🔐 Nhập mã 6 số từ app Authenticator để vào hệ thống:');
      if(!code){ return false; }
      const { error: ve } = await sb.auth.mfa.verify({ factorId: totp.id, challengeId: ch.id, code: (''+code).trim() });
      if(ve){ alert('Mã 2FA sai hoặc đã hết hạn. Vui lòng đăng nhập lại.'); return false; }
    }
    return true;
  }catch(e){ return true; }
}
async function enrollMFA(){
  const { data: f } = await sb.auth.mfa.listFactors();
  if(f && f.totp && f.totp.some(x=>x.status==='verified')){ alert('Tài khoản này đã bật 2FA rồi.'); return; }
  const { data, error } = await sb.auth.mfa.enroll({ factorType:'totp', friendlyName:'CCP-'+Date.now() });
  if(error){ alert('Lỗi bật 2FA: '+error.message); return; }
  const fid=data.id, qr=data.totp.qr_code, secret=data.totp.secret;
  let ov=document.getElementById('mfa-overlay');
  if(!ov){ ov=document.createElement('div'); ov.id='mfa-overlay';
    ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px'; document.body.appendChild(ov); }
  ov.style.display='flex';
  ov.innerHTML=`<div class="card" style="max-width:420px;width:100%;text-align:center">
    <h2 class="sec" style="margin-top:0">🔐 Bật bảo mật 2 lớp</h2>
    <p style="font-size:13px;color:var(--muted);text-align:left;line-height:1.7">1) Mở app <b>Google Authenticator</b> hoặc <b>Authy</b> trên điện thoại.<br>2) Bấm "+" → quét mã QR dưới đây.<br>3) Nhập 6 số app hiển thị để xác nhận.</p>
    <div style="background:#fff;padding:10px;border-radius:10px;display:inline-block">${qr}</div>
    <p style="font-size:11px;color:var(--muted);word-break:break-all">Mã thủ công (nếu không quét được): ${secret}</p>
    <input id="mfa-code" placeholder="Nhập 6 số" style="text-align:center;letter-spacing:4px;font-size:18px">
    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="btn" style="flex:1" type="button" onclick="verifyMFA('${fid}')">Xác nhận bật</button>
      <button class="btn ghost" type="button" onclick="document.getElementById('mfa-overlay').style.display='none'">Huỷ</button>
    </div></div>`;
}
async function verifyMFA(fid){
  const code=(document.getElementById('mfa-code').value||'').trim();
  if(!code){ alert('Nhập mã 6 số trước.'); return; }
  const { error } = await sb.auth.mfa.challengeAndVerify({ factorId: fid, code });
  if(error){ alert('Mã sai hoặc hết hạn, thử lại: '+error.message); return; }
  document.getElementById('mfa-overlay').style.display='none';
  alert('✅ Đã bật 2FA. Từ lần đăng nhập sau, hệ thống sẽ hỏi mã 6 số từ app Authenticator.');
}
async function disableMFA(){
  const { data: f } = await sb.auth.mfa.listFactors();
  const list=(f && f.totp)?f.totp:[];
  if(!list.length){ alert('Tài khoản chưa bật 2FA.'); return; }
  if(!confirm('Tắt bảo mật 2 lớp cho tài khoản này?')) return;
  for(const x of list){ await sb.auth.mfa.unenroll({ factorId: x.id }); }
  alert('Đã tắt 2FA.');
}

  alert('✅ Đã lưu khách "'+rec.ten+'" và tạo việc chăm sóc cho Sale (xem ở Việc cần làm).');
}
async function markCared(id){ const c=findC(id); if(!c)return;
  const upd={follow:D(3), ngay_capnhat:D(0)};
  if(c.tt==='moi_vao')upd.tt='da_tu_van'; if(c.khach_cu&&c.ngay_upsale)upd.ngay_upsale=D(30);
  const { error }=await sb.from('customers').update(upd).eq('id',id);
  if(error){ alert(error.message); return; } await loadAll(); renderAll();
  alert('✅ Đã ghi nhận chăm "'+c.ten+'"');
}
async function quickClose(id){ const c=findC(id); if(!c)return;
  const v=prompt('Nhập doanh thu chốt (USD) cho "'+c.ten+'":','0'); if(v===null)return;
  const upd={tt:'da_chot', dt:Number(v)||0, loai_don:c.khach_cu?'upsell':'moi', follow:null, ngay_chot:(c.ngay_chot||D(0)), ngay_capnhat:D(0)};
  const { error }=await sb.from('customers').update(upd).eq('id',id);
  if(error){ alert(error.message); return; } await loadAll(); renderAll();
  alert('🎉 Đã chốt "'+c.ten+'" — $'+(Number(v)||0));
}
async function saveSpend(e){ e.preventDefault(); const g=id=>document.getElementById(id).value;
  const { error }=await sb.from('marketing_spend').insert({ngay:g('s-ngay'),nguon:g('s-nguon'),mkt:g('s-mkt'),chi_phi:Number(g('s-chi'))||0});
  if(error){ alert(error.message); return; } await loadAll(); renderMarketing();
}
async function saveEdit(e,id){ e.preventDefault();
  const upd=collectEdit();
  const c=DATA.find(x=>String(x.id)===String(id));
  if(upd.tt==='da_chot') upd.loai_don=(c&&c.khach_cu)?'upsell':'moi';
  const { error }=await sb.from('customers').update(upd).eq('id', id);
  if(error){ alert('Lưu lỗi: '+error.message); return; }
  closeEdit(); alert('✅ Đã lưu thay đổi'); await loadAll(); renderAll();
}
async function deleteCustomer(id){
  const c=DATA.find(x=>String(x.id)===String(id)); if(!c)return;
  if(!canDelete(c)){ alert('Bạn không có quyền xoá khách này.'); return; }
  if(!confirm('Đưa khách "'+c.ten+'" vào thùng rác? Admin có thể khôi phục lại.')) return;
  const { error }=await sb.from('customers').update({da_xoa:true}).eq('id', id);
  if(error){ alert('Lỗi: '+error.message); return; }
  alert('🗑️ Đã chuyển "'+c.ten+'" vào thùng rác'); await loadAll(); renderAll();
}
async function restoreCustomer(id){
  if(!(ME.role==='owner'||ME.role==='admin')){ alert('Chỉ Admin mới khôi phục được.'); return; }
  const { error }=await sb.from('customers').update({da_xoa:false}).eq('id', id);
  if(error){ alert('Lỗi: '+error.message); return; }
  alert('♻️ Đã khôi phục khách'); await loadAll(); renderAll();
}
async function purgeCustomer(id){
  if(!(ME.role==='owner'||ME.role==='admin')){ alert('Chỉ Admin mới xoá vĩnh viễn được.'); return; }
  const c=TRASH.find(x=>String(x.id)===String(id));
  if(!confirm('Xoá VĨNH VIỄN'+(c?' "'+c.ten+'"':'')+'? Không khôi phục được nữa.')) return;
  const { error }=await sb.from('customers').delete().eq('id', id);
  if(error){ alert('Lỗi: '+error.message); return; }
  alert('Đã xoá vĩnh viễn.'); await loadAll(); renderAll();
}
function importExcel(){
  const f=document.getElementById('xls-file').files[0]; if(!f){ alert('Chọn file Excel/CSV trước.'); return; }
  const rd=new FileReader();
  rd.onload=async ev=>{ try{
    const wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
    const recs=[];
    rows.forEach(r=>{ const get=(...keys)=>{ for(const k of keys){ const kk=Object.keys(r).find(h=>(''+h).trim().toLowerCase()===k.toLowerCase()); if(kk!==undefined&&r[kk]!=='')return(''+r[kk]).trim(); } return ''; };
      const ten=get('Tên khách hàng','Tên','Name'); if(!ten)return;
      const mucT=get('Mức độ','Mức').toLowerCase(); const muc=(mucT.includes('nóng')||mucT==='nong')?'nong':(mucT.includes('lạnh')||mucT==='lanh')?'lanh':'am';
      const benhT=get('Bệnh lý','Bệnh lý / nhu cầu','Nhu cầu'); const benhKeys=benhT.split(/[;,\/]/).map(s=>revFind(BENH,s.trim())).filter(Boolean);
      const waT=get('WhatsApp','Đã có WhatsApp').toLowerCase(); const tt=revFind(STATUS,get('Trạng thái'))||'tuong_tac';
      const rec={ owner:revFind(SALES,get('Sale','Sale chăm khách'))||(ME.role==='sale'?ME.id:(Object.keys(SALES)[0]||ME.id)),
        mkt:revFind(MKT,get('MKT','MKT phụ trách'))||Object.keys(MKT)[0]||null,
        ten, phone:get('Số điện thoại','SĐT','Số điện thoại / WhatsApp','Phone'), has_wa:['có','x','yes','true','1','đã có'].includes(waT),
        email:get('Email'), quoc_gia:get('Quốc gia','Thị trường','Country'), nguon:revFind(NGUON,get('Nguồn','Nguồn khách'))||'khac',
        benh:benhKeys[0]||'khac', benh_list:benhKeys.map(k=>BENH[k]).join(', ')||benhT, sp:get('Sản phẩm','Sản phẩm quan tâm')||'—',
        muc, tt, follow:normDate(get('Ngày follow','Ngày cần follow tiếp theo'))||null, ghi:get('Ghi chú','Ghi chú tư vấn'),
        dt:Number(get('Doanh thu','Doanh thu (USD)'))||0, ly:'', khach_cu:false, ngay_tao:D(0), ngay_capnhat:D(0) };
      if(isChot(rec.tt))rec.loai_don='moi'; recs.push(rec);
    });
    if(!recs.length){ alert('Không tìm thấy dòng hợp lệ trong file.'); return; }
    const { error }=await sb.from('customers').insert(recs);
    if(error){ alert('Nhập lỗi: '+error.message); return; }
    alert('✅ Đã nhập '+recs.length+' khách hàng.'); document.getElementById('xls-file').value=''; await loadAll(); renderAll(); go('list');
  }catch(err){ alert('Lỗi đọc file: '+err.message); } };
  rd.readAsArrayBuffer(f);
}
/* ---- Phân quyền / khóa tài khoản (cập nhật profiles) ---- */
async function togglePerm(u,m){ const p=(PERMS[u]||[]).slice(); const i=p.indexOf(m); if(i>=0)p.splice(i,1); else p.push(m);
  const { error }=await sb.from('profiles').update({quyen:p}).eq('id',u); if(error){ alert(error.message); return; }
  PERMS[u]=p; if(ME&&ME.uname===u){ ME.quyen=p; applyMenu(); } renderPerms();
}
async function lockAccount(u){ if(u===ME.uname){ alert('Không thể khóa tài khoản đang đăng nhập.'); return; }
  const na = USERS[u].active===false ? true : false;
  const { error }=await sb.from('profiles').update({active:na}).eq('id',u); if(error){ alert(error.message); return; }
  await loadAll(); renderPerms();
}
async function renameAccount(u){
  const cur = USERS[u]? USERS[u].name : '';
  const nv = prompt('Đổi tên nhân sự:', cur); if(nv===null) return;
  const ten = nv.trim(); if(!ten){ alert('Tên không được để trống.'); return; }
  const { error }=await sb.from('profiles').update({ten}).eq('id',u);
  if(error){ alert('Lỗi đổi tên: '+error.message); return; }
  await loadAll(); renderAll();
}
async function createAccount(e){ e.preventDefault();
  const g=id=>document.getElementById(id).value.trim();
  const ten=g('na-name'), email=g('na-user'), pass=g('na-pass')||'123', role=g('na-role');
  if(!ten||!email){ alert('Nhập tên và email đăng nhập.'); return; }
  const btn=e.target.querySelector('button[type=submit]'); if(btn){btn.disabled=true;btn.textContent='Đang tạo...';}
  const { data, error } = await sb.functions.invoke('admin-create-user', { body:{ ten, email, password:pass, role } });
  if(btn){btn.disabled=false;btn.textContent='Tạo tài khoản';}
  if(error){ alert('Tạo lỗi: '+(error.message||error)); return; }
  if(data && data.error){ alert('Tạo lỗi: '+data.error); return; }
  alert('✅ Đã tạo tài khoản "'+ten+'"\nEmail: '+email+'\nMật khẩu: '+pass+'\nVai trò: '+role);
  e.target.reset(); await loadAll(); renderAll();
}
async function delAccount(u){
  if(u===ME.uname){ alert('Không thể xoá tài khoản đang đăng nhập.'); return; }
  const a=USERS[u]; const nm=a?a.name:u;
  if(!confirm('Xoá VĨNH VIỄN tài khoản "'+nm+'"?\nTài khoản sẽ không đăng nhập được nữa. Khách của họ được chuyển về Admin. Không khôi phục được.')) return;
  const { data, error } = await sb.functions.invoke('admin-delete-user', { body:{ id:u } });
  if(error){ alert('Xoá lỗi: '+(error.message||error)); return; }
  if(data && data.error){ alert('Xoá lỗi: '+data.error); return; }
  alert('Đã xoá tài khoản "'+nm+'".'); await loadAll(); renderAll();
}
async function adminResetPass(u){
  const a=USERS[u]; const nm=a?a.name:u;
  const pass=prompt('Đặt mật khẩu MỚI cho "'+nm+'" (tối thiểu 6 ký tự):','123456');
  if(pass===null) return;
  if((pass||'').length<6){ alert('Mật khẩu tối thiểu 6 ký tự.'); return; }
  const { data, error } = await sb.functions.invoke('admin-reset-password', { body:{ id:u, password:pass } });
  if(error){ alert('Lỗi đặt lại mật khẩu: '+(error.message||error)); return; }
  if(data && data.error){ alert('Lỗi: '+data.error); return; }
  alert('✅ Đã đặt lại mật khẩu cho "'+nm+'".\nMật khẩu mới: '+pass+'\nHãy báo nhân viên đăng nhập rồi đổi lại ở mục Cài đặt.');
}

/* ---- Khởi động: đổi ô đăng nhập sang Email + tự đăng nhập nếu còn phiên ---- */
window.addEventListener('DOMContentLoaded', ()=>{
  const u=document.getElementById('u'); if(u) u.placeholder='Email';
  if(sb){ sb.auth.getSession().then(async ({data})=>{ if(data.session){
    if(!sessionStorage.getItem('ccp_active')){ await sb.auth.signOut(); return; } /* tab/trình duyệt mới -> bắt đăng nhập lại */
    if(await ensureMFA()){ afterLogin(); } else { await sb.auth.signOut(); }
  } }); }
});
